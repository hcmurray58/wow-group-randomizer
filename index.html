<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoW Group Randomizer</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#eee;
  margin:20px;
  padding-bottom:5cm; /* added ~5cm bottom space for easier scrolling */
}

#topControls{
  margin-bottom:12px; /* gap between top tickboxes and slots */
}

/* compact header row */
.slot{
  border:1px solid #444;
  margin-bottom:10px;
}

.slotHeader{
  background:#222;
  padding:6px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer; /* whole bar toggles */
}

.slotHeader .slotTitle{
  min-width:140px;
  font-weight:700;
}

.slotBody{
  padding:10px;
  /* remain visible; two states control which rows are shown */
}

/* align class column and spec column so tickboxes/names line up */
.classRow{
  margin-bottom:6px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}

/* class label column */
.classRow > label{
  display:inline-block;
  width:180px;          /* reduced so gap between class and specs is smaller */
  box-sizing:border-box;
  vertical-align:top;
}

/* hide the class checkbox input (class tickboxes not required any more) */
.classRow > label input.classTick{
  display:none;
}

/* specs column occupies remaining space and aligns */
.specs{
  display:inline-block;
  width:calc(100% - 190px);
  box-sizing:border-box;
  margin-left:0;
}

.specs label{
  margin-right:8px;
  display:inline-block;
  /* make spec labels 3 characters wider */
  min-width: calc(120px + 3ch);      /* keep spec labels consistent width for nicer alignment */
}

/* role colours */
.tank{color:#4aa3ff;}
.healer{color:#3ddc84;}
.dps{color:#ff6b6b;}

button{
  padding:4px 10px;
  margin-left:4px;
}

.result{
  margin-top:25px;
  font-size:18px;
}

/* add monospace formatting for generated output (text fallback) */
.result pre{
  font-family:monospace;
  font-size:14px;
  line-height:1.2;
  white-space:pre;
  margin:0 0 8px 0;
}

.header-controls{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

/* ensure select and inputs are compact in header */
.slotHeader input[type="text"],
.slotHeader select{
  padding:4px;
  font-size:13px;
  background:#222;
  color:#eee;
  border:1px solid #555;
}

.slotHeader label{
  cursor:pointer;
}

.updateToggle{
  color:#6cf;
  cursor:pointer;
  text-decoration:underline;
  font-size:13px;
  margin-left:6px;
}
</style>
</head>
<body>

<!-- replaced text title with image -->
<h1><img src="WoW-Group-Randomizer.png" alt="WoW Group Randomizer" style="height:100px"></h1>

<div id="slots"></div>

<!-- moved the five top checkboxes here (below slots, above generate button) -->
<div id="topControls">
  <label><input type="checkbox" id="tankNonPugRequired"> Tank must be non-PUG</label><br>
  <label><input type="checkbox" id="healerNonPugRequired"> Healer must be non-PUG</label><br>

  <label><input type="checkbox" id="lustRequired"> Require Lust</label><br>
  <label><input type="checkbox" id="brezRequired"> Require Battle Rez</label><br>
  <label><input type="checkbox" id="avoidDuplicateDPS"> Avoid duplicate DPS specs</label>
</div>

<button onclick="generate()">Generate Group</button>

<div class="result" id="result"></div>

<script>
const classColors={
  Warrior:"#C79C6E",
  Paladin:"#F58CBA",
  Hunter:"#ABD473",
  Rogue:"#FFF569",
  Priest:"#FFFFFF",
  "Death Knight":"#C41F3B",
  Shaman:"#0070DE",
  Mage:"#69CCF0",
  Warlock:"#9482C9",
  Monk:"#00FF96",
  Druid:"#FF7D0A",
  "Demon Hunter":"#A330C9",
  Evoker:"#33937F"
}

const classes={
  Warrior:[
    {spec:"Protection",role:"tank"},
    {spec:"Arms",role:"dps"},
    {spec:"Fury",role:"dps"}
  ],
  Paladin:[
    {spec:"Protection",role:"tank",brez:true},
    {spec:"Holy",role:"healer",brez:true},
    {spec:"Retribution",role:"dps",brez:true}
  ],
  Druid:[
    {spec:"Guardian",role:"tank",brez:true},
    {spec:"Restoration",role:"healer",brez:true},
    {spec:"Balance",role:"dps",brez:true},
    {spec:"Feral",role:"dps",brez:true}
  ],
  Shaman:[
    {spec:"Restoration",role:"healer",lust:true},
    {spec:"Elemental",role:"dps",lust:true},
    {spec:"Enhancement",role:"dps",lust:true}
  ],
  Mage:[
    {spec:"Arcane",role:"dps",lust:true},
    {spec:"Fire",role:"dps",lust:true},
    {spec:"Frost",role:"dps",lust:true}
  ],
  Priest:[
    {spec:"Holy",role:"healer"},
    {spec:"Discipline",role:"healer"},
    {spec:"Shadow",role:"dps"}
  ],
  Monk:[
    {spec:"Brewmaster",role:"tank"},
    {spec:"Mistweaver",role:"healer"},
    {spec:"Windwalker",role:"dps"}
  ],
  "Demon Hunter":[
    {spec:"Vengeance",role:"tank"},
    {spec:"Havoc",role:"dps"},
    {spec:"Devourer",role:"dps"}
  ],
  "Death Knight":[
    {spec:"Blood",role:"tank",brez:true},
    {spec:"Frost",role:"dps",brez:true},
    {spec:"Unholy",role:"dps",brez:true}
  ],
  Evoker:[
    {spec:"Preservation",role:"healer",lust:true},
    {spec:"Devastation",role:"dps",lust:true},
    {spec:"Augmentation",role:"dps",lust:true}
  ],
  Hunter:[
    {spec:"Beast Mastery",role:"dps",lust:true},
    {spec:"Marksman",role:"dps",lust:true},
    {spec:"Survival",role:"dps",lust:true}
  ],
  Warlock:[
    {spec:"Affliction",role:"dps",brez:true},
    {spec:"Demonology",role:"dps",brez:true},
    {spec:"Destruction",role:"dps",brez:true}
  ],
  Rogue:[
    {spec:"Assassination",role:"dps"},
    {spec:"Outlaw",role:"dps"},
    {spec:"Subtlety",role:"dps"}
  ]
}

function createSlots(){
  const container=document.getElementById("slots")

  for(let i=0;i<5;i++){
    const slot=document.createElement("div")
    slot.className="slot"

    // header toggles the slot state. individual controls stopPropagation so interacting them doesn't toggle.
    slot.innerHTML=`
      <div class="slotHeader" onclick="toggleState(${i})">
        <span class="slotTitle">Slot ${i+1}</span>
        <div class="header-controls">
          <label style="margin-right:6px"><input type="checkbox" class="pug" onchange="onPugToggle(${i})" onclick="event.stopPropagation()"> PUG</label>
          <select class="presetSelect" onchange="presetSelected(${i})" onclick="event.stopPropagation()"></select>
          <span class="updateToggle" onclick="toggleState(${i}); event.stopPropagation()">update</span>
          <input placeholder="Preset name" class="presetName" onclick="event.stopPropagation()">
          <button onclick="savePreset(${i}); event.stopPropagation();">Save</button>
        </div>
      </div>
      <div class="slotBody">
        <div class="classList"></div>
      </div>
    `

    const body=slot.querySelector(".slotBody")
    const classList=slot.querySelector(".classList")

    Object.keys(classes).forEach(cls=>{
      const row=document.createElement("div")
      row.className="classRow"

      let specHTML=""
      classes[cls].forEach(spec=>{
        specHTML+=`
          <label class="specLabel ${spec.role}">
            <input type="checkbox"
              class="specTick"
              data-class="${cls}"
              data-spec="${spec.spec}"
              data-role="${spec.role}"
              data-lust="${spec.lust||false}"
              data-brez="${spec.brez||false}">
            ${spec.spec}
          </label>
        `
      })

      row.innerHTML=`
        <label style="color:${classColors[cls]}">
          <input type="checkbox" class="classTick" onclick="event.stopPropagation()">
          ${cls}
        </label>
        <span class="specs">${specHTML}</span>
      `
      classList.appendChild(row)

      const classBox=row.querySelector(".classTick")
      const specSpan=row.querySelector(".specs")

      // start unchecked and specs hidden
      classBox.checked = false
      specSpan.style.display = "none"
      row.querySelectorAll(".specTick").forEach(s=>s.checked = false)

      // class tickboxes are hidden and not required; visibility controlled by spec ticks + state

      // spec change: if any spec is checked then clear PUG for that slot and enable UI; always ensure state applied
      row.querySelectorAll('.specTick').forEach(s=>{
        s.addEventListener('change', ()=>{
          const slotElem = row.closest('.slot')
          const idx = Array.prototype.indexOf.call(document.querySelectorAll('.slot'), slotElem)
          const pugBox = slotElem.querySelector('.pug')
          if(s.checked && pugBox && pugBox.checked){
            pugBox.checked = false
            onPugToggle(idx)
          }
          // when a spec changes ensure state rules applied so specs visibility updates
          applyState(idx)
        })
      })
    })

    container.appendChild(slot)
    updatePresetDropdown(i)

    // make the preset name input update the header live
    const nameInput = slot.querySelector('.presetName')
    nameInput.addEventListener('input', ()=> updateSlotTitle(i))

    // set initial state: selected-only (State 1)
    slot.dataset.state = 'selected-only'
    applyState(i)

    // start with PUG checked for all slots
    const pugBox = slot.querySelector(".pug")
    if(pugBox){
      pugBox.checked = true
      onPugToggle(i)
    }

    updateSlotTitle(i)
  }
}

createSlots()

function presetSelected(i){
  const slot=document.querySelectorAll(".slot")[i]
  const sel=slot.querySelector(".presetSelect")
  const nameInput=slot.querySelector(".presetName")

  // put selected preset name into text box (remove prefix)
  if(sel.value){
    nameInput.value = sel.value.replace("wowSlotPreset_","")
  } else {
    nameInput.value = ""
  }

  // ensure PUG is cleared when selecting a preset
  const pugBox = slot.querySelector(".pug")
  if(pugBox){
    pugBox.checked = false
    onPugToggle(i)
  }

  // load immediately
  loadPreset(i)
  updateSlotTitle(i)

  // refresh all dropdowns so chosen name can't be picked in other slots
  document.querySelectorAll('.slot').forEach((_, idx) => updatePresetDropdown(idx))
}

function onPugToggle(i){
  const slot=document.querySelectorAll(".slot")[i]
  const pug=slot.querySelector(".pug").checked
  const classList=slot.querySelector(".classList")
  const state = slot.dataset.state || 'selected-only'

  if(pug){
    // Reset all slot inputs when PUG is ticked:
    // - clear preset dropdown and name
    // - uncheck all class checkboxes and spec checkboxes
    // - hide class list if in selected-only state, otherwise leave hidden but disabled
    const sel = slot.querySelector(".presetSelect")
    const name = slot.querySelector(".presetName")
    if(sel) sel.value = ""
    if(name) name.value = ""

    slot.querySelectorAll(".classRow").forEach(row=>{
      const classTick = row.querySelector(".classTick")
      const specInputs = row.querySelectorAll(".specTick")
      if(classTick) classTick.checked = false
      specInputs.forEach(s=> s.checked = false)
      // hide specs and rows while pug is active
      const specSpan = row.querySelector(".specs")
      if(specSpan) specSpan.style.display = "none"
      row.style.display = "none"
      // ensure spec labels are visible when class is later selected (reset any inline hiding)
      row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
    })

    // hide and disable class list when PUG is checked in selected-only state
    if(state === 'selected-only'){
      classList.style.display="none"
      classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
    } else {
      // in 'all' state keep class list visually available but inputs disabled
      classList.style.display="block"
      classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
    }
  } else {
    // Re-enable UI when PUG cleared. Restore visibility according to current state.
    classList.style.display="block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=false)
    applyState(i)
  }
  updateSlotTitle(i)
}

// toggle between two states:
// 'selected-only' (State 1): show only selected classes and all their specs
// 'all' (State 2): show all classes; selected classes show their specs
function toggleState(i){
  const slot=document.querySelectorAll(".slot")[i]
  const current = slot.dataset.state || 'selected-only'
  const next = current === 'selected-only' ? 'all' : 'selected-only'
  slot.dataset.state = next
  applyState(i)
  updateSlotTitle(i)
}

function applyState(i){
  const slot = document.querySelectorAll(".slot")[i]
  if(!slot) return
  const state = slot.dataset.state || 'selected-only'
  const classRows = slot.querySelectorAll(".classRow")
  classRows.forEach(row=>{
    const specSpan = row.querySelector(".specs")
    const anySpecChecked = row.querySelectorAll('.specTick:checked').length > 0

    if(state === 'all'){
      // show every class row and show all spec labels
      row.style.display = "block"
      if(specSpan) specSpan.style.display = "inline"
      row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
    } else {
      // selected-only: only show rows where at least one spec is checked; show all specs for those
      if(anySpecChecked){
        row.style.display = "block"
        if(specSpan) specSpan.style.display = "inline"
        row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
      } else {
        row.style.display = "none"
        if(specSpan) specSpan.style.display = "none"
      }
    }
  })

  // classList visibility depends on state and pug
  const classList = slot.querySelector(".classList")
  if(state === 'all'){
    classList.style.display = "block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled = false)
  } else {
    // selected-only: hide classList entirely if PUG checked, otherwise show it (but rows filtered above)
    if(slot.querySelector(".pug") && slot.querySelector(".pug").checked){
      classList.style.display = "none"
    } else {
      classList.style.display = "block"
    }
  }
}

function updateSlotTitle(i){
  const slot=document.querySelectorAll(".slot")[i]
  const titleEl=slot.querySelector(".slotTitle")

  if(slot.querySelector(".pug").checked){
    titleEl.textContent=`PUG`
    return
  }

  const selectVal = slot.querySelector(".presetSelect").value
  const nameInputVal = slot.querySelector(".presetName").value.trim()

  if(selectVal){
    titleEl.textContent = selectVal.replace("wowSlotPreset_","")
  } else if(nameInputVal){
    titleEl.textContent = nameInputVal
  } else {
    titleEl.textContent = `Slot ${i+1}`
  }
}

// helper to get the canonical slot name (without appended class list)
function getSlotName(slot, i){
  if(slot.querySelector(".pug") && slot.querySelector(".pug").checked) return "PUG"
  const nameInputVal = slot.querySelector(".presetName") && slot.querySelector(".presetName").value.trim()
  const selectVal = slot.querySelector(".presetSelect") && slot.querySelector(".presetSelect").value
  if(nameInputVal) return nameInputVal
  if(selectVal) return selectVal.replace("wowSlotPreset_","")
  return `Slot ${i+1}`
}

function savePreset(i){
  const slot=document.querySelectorAll(".slot")[i]
  const name=slot.querySelector(".presetName").value
  if(!name) return

  let preset=[]
  slot.querySelectorAll(".classRow").forEach(row=>{
    const classTick = row.querySelector(".classTick")
    const specInputs = [...row.querySelectorAll(".specTick")]
    preset.push({
      classEnabled: classTick.checked,
      specs: specInputs.map(s=>({checked:s.checked}))
    })
  })

  localStorage.setItem("wowSlotPreset_"+name,JSON.stringify(preset))
  // refresh all dropdowns so the new name is reflected and disabled in other slots
  document.querySelectorAll('.slot').forEach((_, idx) => updatePresetDropdown(idx))
  slot.querySelector(".presetSelect").value="wowSlotPreset_"+name

  updateSlotTitle(i)
}

function loadPreset(i){
  const slot=document.querySelectorAll(".slot")[i]
  const key=slot.querySelector(".presetSelect").value
  if(!key) return
  const raw = localStorage.getItem(key)
  if(!raw) return
  const preset=JSON.parse(raw)

  const classRows = slot.querySelectorAll(".classRow")
  let anySpecChecked = false
  classRows.forEach((row, index)=>{
    const entry = preset[index]
    const classTick = row.querySelector(".classTick")
    const specInputs = [...row.querySelectorAll(".specTick")]
    const specSpan = row.querySelector(".specs")

    if(!entry){
      classTick.checked = false
      row.style.display = "none"
      specInputs.forEach(s=>{
        s.checked=false
        s.parentElement.style.display = ""
      })
      if(specSpan) specSpan.style.display = "none"
      return
    }

    classTick.checked = !!entry.classEnabled

    // Restore checked states for specs but always show spec labels for selected classes
    specInputs.forEach((s, si)=>{
      const specEntry = entry.specs && entry.specs[si]
      s.checked = !!(specEntry && specEntry.checked)
      if(s.checked) anySpecChecked = true
      s.parentElement.style.display = ""
    })

    if(classTick.checked){
      row.style.display = "block"
      if(specSpan) specSpan.style.display = "inline"
    } else {
      row.style.display = "none"
      if(specSpan) specSpan.style.display = "none"
    }
  })

  // if any spec restored as checked, clear PUG and ensure UI enabled
  const pugBox = slot.querySelector(".pug")
  if(anySpecChecked && pugBox && pugBox.checked){
    pugBox.checked = false
    onPugToggle(i)
  }

  // if pug is checked, hide entire class list only if in selected-only state
  const classList = slot.querySelector(".classList")
  if(slot.querySelector(".pug").checked && slot.dataset.state === 'selected-only'){
    classList.style.display="none"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
  } else {
    classList.style.display="block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=false)
  }

  // set name input to selected preset name
  slot.querySelector(".presetName").value = key.replace("wowSlotPreset_","")

  // keep state as selected-only after load
  slot.dataset.state = 'selected-only'
  applyState(i)
  updateSlotTitle(i)
}

function updatePresetDropdown(i){
  const slot=document.querySelectorAll(".slot")[i]
  const select=slot.querySelector(".presetSelect")
  const prevValue = select.value || ""
  select.innerHTML=""
  const newOpt=document.createElement("option")
  newOpt.value=""
  newOpt.text="New"
  select.appendChild(newOpt)

  // collect preset keys and sort alphabetically by display name
  const presets=[]
  for(let j=0;j<localStorage.length;j++){
    const key=localStorage.key(j)
    if(key.startsWith("wowSlotPreset_")){
      presets.push(key)
    }
  }
  presets.sort((a,b)=>{
    const aName = a.replace("wowSlotPreset_","").toLowerCase()
    const bName = b.replace("wowSlotPreset_","").toLowerCase()
    return aName.localeCompare(bName)
  })

  // collect other slots' current selections so we can disable those options here
  const otherSelected = new Set(
    [...document.querySelectorAll('.presetSelect')]
      .map(s => s.value)
      .filter(v => v && v !== prevValue)
  )

  presets.forEach(key=>{
    const opt=document.createElement("option")
    opt.value=key
    opt.text=key.replace("wowSlotPreset_","")
    // disable option if another slot (not this one) already has it selected
    if(otherSelected.has(key)) opt.disabled = true
    select.appendChild(opt)
  })

  select.value = prevValue && [...select.options].some(o=>o.value===prevValue) ? prevValue : ""
}

function random(arr){ return arr[Math.floor(Math.random()*arr.length)] }

function padRight(str, width){
  str = String(str);
  if(str.length >= width) return str;
  return str + " ".repeat(width - str.length);
}

function generate(){
  const slots=[...document.querySelectorAll(".slot")]
  let slotChoices=[]

  // ensure we have index so we can update slot UI when treating empty as PUG
  slots.forEach((slot, idx)=>{
    if(slot.querySelector(".pug").checked){
      slotChoices.push("pug")
    } else {
      let specs=[]
      slot.querySelectorAll(".classRow").forEach(row=>{
        // collect spec ticks regardless of class tickboxes or visibility
        row.querySelectorAll(".specTick").forEach(spec=>{
          if(spec.checked){
            specs.push({
              class:spec.dataset.class,
              spec:spec.dataset.spec,
              role:spec.dataset.role,
              lust:spec.dataset.lust==="true",
              brez:spec.dataset.brez==="true"
            })
          }
        })
      })
      // if no user choices treat as PUG and update the slot UI
      if(specs.length===0){
        const pugBox = slot.querySelector(".pug")
        if(pugBox){
          pugBox.checked = true
          onPugToggle(idx)
        }
        slotChoices.push("pug")
      } else {
        slotChoices.push(specs)
      }
    }
  })

  for(let attempt=0;attempt<10000;attempt++){
    let group=[]
    let roles=["tank","healer","dps","dps","dps"]
    for(let i=roles.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1)); [roles[i],roles[j]]=[roles[j],roles[i]]
    }

    for(let i=0;i<5;i++){
      if(slotChoices[i]==="pug"){
        group.push({pug:true, role:roles[i], slotIndex:i})
      } else {
        const options=slotChoices[i].filter(o=>o.role===roles[i])
        if(options.length===0) continue
        // clone chosen option and attach slot index
        const chosen = {...random(options), slotIndex:i}
        group.push(chosen)
      }
    }

    if(group.length<5) continue

    if(document.getElementById("tankNonPugRequired").checked){
      if(group.some(g=>g.role==="tank" && g.pug)) continue
    }
    if(document.getElementById("healerNonPugRequired").checked){
      if(group.some(g=>g.role==="healer" && g.pug)) continue
    }
    if(document.getElementById("avoidDuplicateDPS").checked){
      const dps=group.filter(g=>g.role==="dps" && !g.pug).map(g=>g.spec)
      if(new Set(dps).size!==dps.length) continue
    }
    if(document.getElementById("lustRequired").checked){
      if(!group.some(g=>g.lust)) continue
    }
    if(document.getElementById("brezRequired").checked){
      if(!group.some(g=>g.brez)) continue
    }

    // Build nicely aligned lines using slot names and keep colouring for class + spec and role
    const lineHeight = 20
    const font = "14px monospace"

    function formatRole(role){
      if(!role) return ""
      if(role==="dps") return "DPS"
      return role.charAt(0).toUpperCase()+role.slice(1)
    }

    // sort: Tank, Healer, then DPS alphabetical by slot name
    const rolePriority = {tank:0, healer:1, dps:2}
    const sortedGroup = [...group].sort((a,b)=>{
      const pa = rolePriority[a.role] ?? 99
      const pb = rolePriority[b.role] ?? 99
      if(pa !== pb) return pa - pb
      // same role: alphabetical by slot name
      const nameA = getSlotName(slots[a.slotIndex], a.slotIndex)
      const nameB = getSlotName(slots[b.slotIndex], b.slotIndex)
      return nameA.localeCompare(nameB)
    })

    // Prepare structured lines for text fallback and image rendering
    const linesData = sortedGroup.map(g=>{
      return {
        slotName: getSlotName(slots[g.slotIndex], g.slotIndex),
        role: g.role || "",
        roleText: formatRole(g.role),
        className: g.class || "",
        specName: g.spec || "",
        color: classColors[g.class] || '#fff',
        isPug: !!g.pug,
        slotIndex: g.slotIndex
      }
    })

    // determine column widths dynamically so columns line up vertically,
    // with at least a 3-character gap between columns
    const tempCanvas = document.createElement('canvas')
    const tempCtx = tempCanvas.getContext('2d')
    tempCtx.font = font
    const charW = tempCtx.measureText('M').width
    const minGap = 3 * charW

    const measureNameW = (t) => tempCtx.measureText((t||'') + ':').width
    const measureRoleW = (t) => tempCtx.measureText(t||'').width
    const measureClassW = (t) => tempCtx.measureText(t||'').width
    const measureSpecW = (t) => tempCtx.measureText(t||'').width

    const maxNameW = Math.max(0, ...linesData.map(ld => measureNameW(ld.slotName)))
    const maxRoleW = Math.max(0, ...linesData.map(ld => measureRoleW(ld.roleText)))
    const maxClassW = Math.max(0, ...linesData.map(ld => measureClassW(ld.className)))
    const maxSpecW = Math.max(0, ...linesData.map(ld => measureSpecW(ld.specName)))

    const nameFieldWidth = Math.ceil(maxNameW + minGap)
    const roleFieldWidth = Math.ceil(maxRoleW + minGap)
    const classFieldWidth = Math.ceil(maxClassW + minGap)

    const leftPadding = 10
    const rightPadding = 10

    // compute footer lines (Lust + Brez + optional requirement status lines)
    const requireLust = document.getElementById("lustRequired").checked
    const requireBrez = document.getElementById("brezRequired").checked
    let footerLines = 2
    if(requireLust) footerLines += 1
    if(requireBrez) footerLines += 1

    const canvasWidth = leftPadding + nameFieldWidth + roleFieldWidth + classFieldWidth + maxSpecW + rightPadding + 6
    const canvasHeight = 10 + linesData.length * lineHeight + footerLines * lineHeight + 10
    const canvas = document.createElement('canvas')
    canvas.width = Math.max(300, Math.ceil(canvasWidth))
    canvas.height = Math.ceil(canvasHeight)
    const ctx = canvas.getContext('2d')

    // nicer background: rounded rect with subtle gradient and border
    function roundRect(ctx,x,y,w,h,r){
      const rr = Math.min(r, w/2, h/2)
      ctx.beginPath()
      ctx.moveTo(x+rr, y)
      ctx.arcTo(x+w, y,     x+w, y+h, rr)
      ctx.arcTo(x+w, y+h,   x,   y+h, rr)
      ctx.arcTo(x,   y+h,   x,   y,   rr)
      ctx.arcTo(x,   y,     x+w, y,   rr)
      ctx.closePath()
    }

    // background gradient
    const bgGrad = ctx.createLinearGradient(0,0,0,canvas.height)
    bgGrad.addColorStop(0, "#141414")
    bgGrad.addColorStop(1, "#0c0c0c")

    // fill rounded background slightly inset for a neat border
    const inset = 2
    roundRect(ctx, inset, inset, canvas.width - inset*2, canvas.height - inset*2, 8)
    ctx.fillStyle = bgGrad
    ctx.fill()

    // subtle inner border
    ctx.lineWidth = 2
    ctx.strokeStyle = "rgba(255,255,255,0.04)"
    ctx.stroke()

    // subtle separators between columns to guide the eye
    ctx.save()
    ctx.globalAlpha = 0.08
    ctx.strokeStyle = "#ffffff"
    ctx.lineWidth = 1
    ctx.beginPath()
    ctx.moveTo(xRole - 6, 8)
    ctx.lineTo(xRole - 6, canvas.height - 8)
    ctx.moveTo(xClass - 6, 8)
    ctx.lineTo(xClass - 6, canvas.height - 8)
    ctx.stroke()
    ctx.restore()

    // nicer text settings
    ctx.font = font
    ctx.textBaseline = "top"

    // draw each line using computed column X positions
    const xName = leftPadding
    const xRole = xName + nameFieldWidth
    const xClass = xRole + roleFieldWidth
    const xSpec = xClass + classFieldWidth

    linesData.forEach((ld, idx) => {
      const y = 10 + idx * lineHeight
      // name
      ctx.fillStyle = "#eee"
      ctx.fillText(ld.slotName + ":", xName, y)

      // role (tank/ healer / DPS - DPS red)
      const roleColor = ld.role === 'tank' ? '#4aa3ff' : (ld.role === 'healer' ? '#3ddc84' : '#ff6b6b')
      ctx.fillStyle = roleColor
      ctx.fillText(ld.roleText, xRole, y)

      if(ld.isPug) return

      // class and spec
      ctx.fillStyle = ld.color
      ctx.fillText(ld.className, xClass, y)
      ctx.fillText(ld.specName, xSpec, y)
    })

    // providers info at bottom
    const lustProvidersData = linesData.filter(ld=>{
      if(ld.isPug) return false
      const cls = classes[ld.className] || []
      const specEntry = cls.find(s=>s.spec===ld.specName) || {}
      return !!specEntry.lust
    }).map(ld=>({ name: ld.slotName, color: classColors[ld.className] || '#eee' }))

    const brezProvidersData = linesData.filter(ld=>{
      if(ld.isPug) return false
      const cls = classes[ld.className] || []
      const specEntry = cls.find(s=>s.spec===ld.specName) || {}
      return !!specEntry.brez
    }).map(ld=>({ name: ld.slotName, color: classColors[ld.className] || '#eee' }))

    let footerY = 10 + linesData.length * lineHeight + 6
    // Lust providers line: label then coloured names
    ctx.fillStyle = "#eee"
    const lustLabel = "Lust providers: "
    ctx.fillText(lustLabel, leftPadding, footerY)
    let x = leftPadding + ctx.measureText(lustLabel).width
    if(lustProvidersData.length === 0){
      ctx.fillStyle = "#eee"
      ctx.fillText("(none)", x, footerY)
    } else {
      lustProvidersData.forEach((p, idx)=>{
        ctx.fillStyle = p.color
        ctx.fillText(p.name, x, footerY)
        x += ctx.measureText(p.name).width
        if(idx < lustProvidersData.length - 1){
          ctx.fillStyle = "#eee"
          const sep = ", "
          ctx.fillText(sep, x, footerY)
          x += ctx.measureText(sep).width
        }
      })
    }
    footerY += lineHeight

    // Battle Rez providers line
    ctx.fillStyle = "#eee"
    const brezLabel = "Battle Rez providers: "
    ctx.fillText(brezLabel, leftPadding, footerY)
    x = leftPadding + ctx.measureText(brezLabel).width
    if(brezProvidersData.length === 0){
      ctx.fillStyle = "#eee"
      ctx.fillText("(none)", x, footerY)
    } else {
      brezProvidersData.forEach((p, idx)=>{
        ctx.fillStyle = p.color
        ctx.fillText(p.name, x, footerY)
        x += ctx.measureText(p.name).width
        if(idx < brezProvidersData.length - 1){
          ctx.fillStyle = "#eee"
          const sep = ", "
          ctx.fillText(sep, x, footerY)
          x += ctx.measureText(sep).width
        }
      })
    }
    footerY += lineHeight

    // (requireLust / requireBrez already read above)
    if(requireLust || requireBrez){
      if(requireLust){
        ctx.fillStyle = (lustProvidersData.length ? "#3ddc84" : "#ff6b6b")
        ctx.fillText("Lust: " + (lustProvidersData.length ? "OK" : "MISSING"), leftPadding, footerY)
        footerY += lineHeight
      }
      if(requireBrez){
        ctx.fillStyle = (brezProvidersData.length ? "#3ddc84" : "#ff6b6b")
        ctx.fillText("Battle Rez: " + (brezProvidersData.length ? "OK" : "MISSING"), leftPadding, footerY)
        footerY += lineHeight
      }
    }

    // show both image and text fallback; add copy button
    const resultDiv = document.getElementById("result")
    resultDiv.innerHTML = ""

    // image only
    const img = document.createElement('img')
    img.src = canvas.toDataURL('image/png')
    img.alt = "Group output image"
    img.style.maxWidth = "100%"
    img.style.display = "block"
    img.style.border = "1px solid rgba(255,255,255,0.06)"
    img.style.borderRadius = "8px"
    img.style.boxShadow = "0 8px 24px rgba(0,0,0,0.6)"
    img.style.background = "#0b0b0b"
    resultDiv.appendChild(img)

    // copy button
    const copyBtn = document.createElement('button')
    copyBtn.textContent = "Copy image"
    copyBtn.onclick = async function(){
      try{
        // canvas -> blob -> clipboard
        canvas.toBlob(async function(blob){
          if(!blob) throw new Error("Failed to create image blob")
          if(navigator.clipboard && navigator.clipboard.write){
            const item = new ClipboardItem({'image/png': blob})
            await navigator.clipboard.write([item])
            copyBtn.textContent = "Copied"
            setTimeout(()=> copyBtn.textContent = "Copy image", 1500)
          } else {
            // fallback: open image in new tab for manual copy
            const url = URL.createObjectURL(blob)
            window.open(url, "_blank")
          }
        })
      }catch(e){
        // fallback open data URL
        const url = img.src
        window.open(url, "_blank")
      }
    }
    resultDiv.appendChild(copyBtn)

    // (no text fallback)

    return
  }

  document.getElementById("result").innerHTML="No valid group found."
}
</script>

</body>
</html>
