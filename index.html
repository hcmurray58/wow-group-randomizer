<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoW Group Randomizer</title>

<style>

body{
font-family:Arial;
background:#111;
color:#eee;
margin:20px;
}

.slot{
border:1px solid #444;
margin-bottom:10px;
}

.slotHeader{
background:#222;
padding:8px;
cursor:pointer;
font-weight:bold;
user-select:none;
}

.slotHeader:hover{
background:#333;
}

.slotBody{
padding:10px;
}

.classRow{
margin-bottom:6px;
}

.specs{
display:none;
margin-left:10px;
}

.specs label{
margin-right:8px;
}

.result{
margin-top:30px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.resultSlot{
text-align:center;
width:120px;
}

.resultSlot img{
width:56px;
height:56px;
}

</style>

</head>
<body>

<h1>WoW Group Randomizer</h1>

<label><input type="checkbox" id="lustRequired"> Require Lust</label><br>
<label><input type="checkbox" id="brezRequired"> Require Battle Rez</label><br>
<label><input type="checkbox" id="avoidDuplicateDPS"> Avoid duplicate DPS specs</label>

<h2>Group Slots</h2>

<div id="slots"></div>

<button onclick="generate()">Generate Group</button>

<div class="result" id="result"></div>

<script>

const specIcons={
"Protection Warrior":"https://wow.zamimg.com/images/wow/icons/large/ability_warrior_defensivestance.jpg",
"Arms Warrior":"https://wow.zamimg.com/images/wow/icons/large/ability_warrior_savageblow.jpg",
"Fury Warrior":"https://wow.zamimg.com/images/wow/icons/large/ability_warrior_innerrage.jpg",

"Protection Paladin":"https://wow.zamimg.com/images/wow/icons/large/ability_paladin_shieldofthetemplar.jpg",
"Holy Paladin":"https://wow.zamimg.com/images/wow/icons/large/spell_holy_holybolt.jpg",
"Retribution Paladin":"https://wow.zamimg.com/images/wow/icons/large/spell_holy_auraoflight.jpg",

"Guardian Druid":"https://wow.zamimg.com/images/wow/icons/large/ability_racial_bearform.jpg",
"Restoration Druid":"https://wow.zamimg.com/images/wow/icons/large/spell_nature_healingtouch.jpg",
"Balance Druid":"https://wow.zamimg.com/images/wow/icons/large/spell_nature_starfall.jpg",
"Feral Druid":"https://wow.zamimg.com/images/wow/icons/large/ability_druid_catform.jpg",

"Vengeance DemonHunter":"https://wow.zamimg.com/images/wow/icons/large/ability_demonhunter_metamorphasis.jpg",
"Havoc DemonHunter":"https://wow.zamimg.com/images/wow/icons/large/ability_demonhunter_specdps.jpg",
"Devourer DemonHunter":"https://wow.zamimg.com/images/wow/icons/large/spell_shadow_demonictactics.jpg"
}

const roleIcons={
tank:"https://wow.zamimg.com/images/wow/icons/large/ability_defend.jpg",
healer:"https://wow.zamimg.com/images/wow/icons/large/spell_holy_heal.jpg",
dps:"https://wow.zamimg.com/images/wow/icons/large/ability_rogue_eviscerate.jpg"
}

const classes={
Warrior:[
{spec:"Protection",role:"tank"},
{spec:"Arms",role:"dps"},
{spec:"Fury",role:"dps"}
],
Paladin:[
{spec:"Protection",role:"tank"},
{spec:"Holy",role:"healer"},
{spec:"Retribution",role:"dps"}
],
Druid:[
{spec:"Guardian",role:"tank"},
{spec:"Restoration",role:"healer"},
{spec:"Balance",role:"dps"},
{spec:"Feral",role:"dps"}
],
DemonHunter:[
{spec:"Vengeance",role:"tank"},
{spec:"Havoc",role:"dps"},
{spec:"Devourer",role:"dps"}
]
}

function createSlots(){

const container=document.getElementById("slots")

for(let i=0;i<5;i++){

const slot=document.createElement("div")
slot.className="slot"

slot.innerHTML=`
<div class="slotHeader" onclick="toggleSlot(${i})">▼ Slot ${i+1}</div>
<div class="slotBody">

<label><input type="checkbox" class="pug" onchange="updateHeader(${i})"> PUG</label>

<br><br>

<input placeholder="Preset name" class="presetName">
<button onclick="savePreset(${i})">Save</button>

<select class="presetSelect"></select>
<button onclick="loadPreset(${i})">Load</button>

<br><br>

</div>
`

const body=slot.querySelector(".slotBody")

Object.keys(classes).forEach(cls=>{

const row=document.createElement("div")
row.className="classRow"

let specHTML=""

classes[cls].forEach(spec=>{

specHTML+=`
<label>
<input type="checkbox" class="specTick" checked
data-class="${cls}"
data-spec="${spec.spec}"
data-role="${spec.role}">
${spec.spec}
</label>
`

})

row.innerHTML=`
<label>
<input type="checkbox" class="classTick">
${cls}
</label>

<span class="specs">${specHTML}</span>
`

body.appendChild(row)

const classBox=row.querySelector(".classTick")
const specSpan=row.querySelector(".specs")

classBox.addEventListener("change",()=>{

if(classBox.checked){
specSpan.style.display="inline"
specSpan.querySelectorAll("input").forEach(s=>s.checked=true)
}else{
specSpan.style.display="none"
}

})

})

container.appendChild(slot)

}

}

createSlots()

function toggleSlot(i){

const slot=document.querySelectorAll(".slot")[i]
const body=slot.querySelector(".slotBody")
const header=slot.querySelector(".slotHeader")

if(body.style.display==="none"){
body.style.display="block"
header.innerHTML=header.innerHTML.replace("▶","▼")
}else{
body.style.display="none"
header.innerHTML=header.innerHTML.replace("▼","▶")+" (click to expand)"
}

}

function updateHeader(i){

const slot=document.querySelectorAll(".slot")[i]
const header=slot.querySelector(".slotHeader")
const pug=slot.querySelector(".pug").checked

if(pug){
header.innerHTML=`▼ PUG`
}else{
header.innerHTML=`▼ Slot ${i+1}`
}

}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){

const slots=[...document.querySelectorAll(".slot")]
let group=[]
let roles=["tank","healer","dps","dps","dps"]

roles.sort(()=>Math.random()-0.5)

for(let i=0;i<5;i++){

const slot=slots[i]

if(slot.querySelector(".pug").checked){

group.push({pug:true,role:roles[i]})

}else{

let specs=[]

slot.querySelectorAll(".classTick").forEach(classBox=>{

if(classBox.checked){

classBox.parentElement.nextElementSibling
.querySelectorAll(".specTick")
.forEach(spec=>{

if(spec.checked){

specs.push({
class:spec.dataset.class,
spec:spec.dataset.spec,
role:spec.dataset.role
})

}

})

}

})

const options=specs.filter(s=>s.role===roles[i])

if(options.length===0) return

group.push(random(options))

}

}

renderResult(group)

}

function renderResult(group){

const result=document.getElementById("result")
result.innerHTML=""

group.forEach(g=>{

const div=document.createElement("div")
div.className="resultSlot"

if(g.pug){

div.innerHTML=`
<img src="${roleIcons[g.role]}">
<br>
PUG ${g.role.toUpperCase()}
`

}else{

const icon=specIcons[`${g.spec} ${g.class}`] || roleIcons[g.role]

div.innerHTML=`
<img src="${icon}">
<br>
${g.spec} ${g.class}
`

}

result.appendChild(div)

})

}

</script>

</body>
</html>
