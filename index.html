<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoW Group Randomizer</title>

<style>

body{
font-family:Arial;
background:#111;
color:#eee;
margin:20px;
}

.slot{
border:1px solid #444;
margin-bottom:10px;
}

.slotHeader{
background:#222;
padding:6px;
cursor:pointer;
font-weight:bold;
}

.slotBody{
padding:10px;
display:block;
}

.classRow{
margin-bottom:6px;
}

.specs{
display:none;
margin-left:10px;
}

.specs label{
margin-right:8px;
}

.tank{color:#4aa3ff;}
.healer{color:#3ddc84;}
.dps{color:#ff6b6b;}

button{
padding:4px 10px;
margin-left:4px;
}

.result{
margin-top:25px;
font-size:18px;
}

</style>
</head>
<body>

<h1>WoW Group Randomizer</h1>

<label><input type="checkbox" id="lustRequired"> Require Lust</label><br>
<label><input type="checkbox" id="brezRequired"> Require Battle Rez</label><br>
<label><input type="checkbox" id="avoidDuplicateDPS"> Avoid duplicate DPS specs</label>

<h2>Group Slots</h2>

<div id="slots"></div>

<button onclick="generate()">Generate Group</button>

<div class="result" id="result"></div>

<script>

const classColors={
Warrior:"#C79C6E",
Paladin:"#F58CBA",
Hunter:"#ABD473",
Rogue:"#FFF569",
Priest:"#FFFFFF",
DeathKnight:"#C41F3B",
Shaman:"#0070DE",
Mage:"#69CCF0",
Warlock:"#9482C9",
Monk:"#00FF96",
Druid:"#FF7D0A",
DemonHunter:"#A330C9",
Evoker:"#33937F"
}

const classes={

Warrior:[
{spec:"Protection",role:"tank"},
{spec:"Arms",role:"dps"},
{spec:"Fury",role:"dps"}
],

Paladin:[
{spec:"Protection",role:"tank"},
{spec:"Holy",role:"healer"},
{spec:"Retribution",role:"dps",brez:true}
],

Druid:[
{spec:"Guardian",role:"tank",brez:true},
{spec:"Restoration",role:"healer",brez:true},
{spec:"Balance",role:"dps",brez:true},
{spec:"Feral",role:"dps",brez:true}
],

Shaman:[
{spec:"Restoration",role:"healer",lust:true},
{spec:"Elemental",role:"dps",lust:true},
{spec:"Enhancement",role:"dps",lust:true}
],

Mage:[
{spec:"Arcane",role:"dps",lust:true},
{spec:"Fire",role:"dps",lust:true},
{spec:"Frost",role:"dps",lust:true}
],

Priest:[
{spec:"Holy",role:"healer"},
{spec:"Discipline",role:"healer"},
{spec:"Shadow",role:"dps"}
],

Monk:[
{spec:"Brewmaster",role:"tank"},
{spec:"Mistweaver",role:"healer"},
{spec:"Windwalker",role:"dps"}
],

DemonHunter:[
{spec:"Vengeance",role:"tank"},
{spec:"Havoc",role:"dps"},
{spec:"Devourer",role:"dps"}
],

DeathKnight:[
{spec:"Blood",role:"tank",brez:true},
{spec:"Frost",role:"dps",brez:true},
{spec:"Unholy",role:"dps",brez:true}
],

Evoker:[
{spec:"Preservation",role:"healer"},
{spec:"Devastation",role:"dps",lust:true},
{spec:"Augmentation",role:"dps",lust:true}
],

Hunter:[
{spec:"Beast Mastery",role:"dps",lust:true},
{spec:"Marksman",role:"dps",lust:true},
{spec:"Survival",role:"dps",lust:true}
],

Warlock:[
{spec:"Affliction",role:"dps",brez:true},
{spec:"Demonology",role:"dps",brez:true},
{spec:"Destruction",role:"dps",brez:true}
],

Rogue:[
{spec:"Assassination",role:"dps"},
{spec:"Outlaw",role:"dps"},
{spec:"Subtlety",role:"dps"}
]

}

function createSlots(){

const container=document.getElementById("slots")

for(let i=0;i<5;i++){

const slot=document.createElement("div")
slot.className="slot"

slot.innerHTML=`
<div class="slotHeader" onclick="toggleSlot(${i})">Slot ${i+1} - New Member</div>
<div class="slotBody">

<label><input type="checkbox" class="pug" onchange="updateSlotTitle(${i})"> PUG</label>

<br>
<input placeholder="Preset name" class="presetName">
<button onclick="savePreset(${i})">Save</button>

<select class="presetSelect"></select>
<button onclick="loadPreset(${i})">Load</button>

<br><br>

</div>
`

const body=slot.querySelector(".slotBody")

Object.keys(classes).forEach(cls=>{

const row=document.createElement("div")
row.className="classRow"

let specHTML=""

classes[cls].forEach(spec=>{

specHTML+=`
<label class="${spec.role}">
<input type="checkbox"
class="specTick"
checked
data-class="${cls}"
data-spec="${spec.spec}"
data-role="${spec.role}"
data-lust="${spec.lust||false}"
data-brez="${spec.brez||false}">
${spec.spec}
</label>
`

})

row.innerHTML=`
<label style="color:${classColors[cls]}">
<input type="checkbox" class="classTick">
${cls}
</label>

<span class="specs">
${specHTML}
</span>
`

body.appendChild(row)

const classBox=row.querySelector(".classTick")
const specSpan=row.querySelector(".specs")

classBox.addEventListener("change",()=>{

if(classBox.checked){

specSpan.style.display="inline"
specSpan.querySelectorAll("input").forEach(s=>s.checked=true)

}else{

specSpan.style.display="none"

}

})

})

container.appendChild(slot)

updatePresetDropdown(i)

}

}

createSlots()

function toggleSlot(i){

const slot=document.querySelectorAll(".slot")[i]
const body=slot.querySelector(".slotBody")

body.style.display = body.style.display==="none"?"block":"none"

}

function updateSlotTitle(i){

const slot=document.querySelectorAll(".slot")[i]
const header=slot.querySelector(".slotHeader")

if(slot.querySelector(".pug").checked){

header.textContent=`Slot ${i+1} - PUG`

}else{

const name=slot.querySelector(".presetSelect").value

header.textContent=name?`Slot ${i+1} - ${name.replace("wowSlotPreset_","")}`:`Slot ${i+1} - New Member`

}

}

function savePreset(i){

const slot=document.querySelectorAll(".slot")[i]
const name=slot.querySelector(".presetName").value

if(!name)return

let preset=[]

slot.querySelectorAll(".classTick").forEach(c=>{

preset.push({
classEnabled:c.checked,
specs:[...c.parentElement.nextElementSibling.querySelectorAll("input")].map(s=>s.checked)
})

})

localStorage.setItem("wowSlotPreset_"+name,JSON.stringify(preset))

updatePresetDropdown(i)

slot.querySelector(".presetSelect").value="wowSlotPreset_"+name

updateSlotTitle(i)

}

function loadPreset(i){

const slot=document.querySelectorAll(".slot")[i]
const key=slot.querySelector(".presetSelect").value

const preset=JSON.parse(localStorage.getItem(key))

slot.querySelectorAll(".classTick").forEach((c,index)=>{

c.checked=preset[index].classEnabled

const specs=c.parentElement.nextElementSibling.querySelectorAll("input")

specs.forEach((s,j)=>s.checked=preset[index].specs[j])

c.parentElement.nextElementSibling.style.display=c.checked?"inline":"none"

})

updateSlotTitle(i)

}

function updatePresetDropdown(i){

const slot=document.querySelectorAll(".slot")[i]
const select=slot.querySelector(".presetSelect")

select.innerHTML=""

for(let j=0;j<localStorage.length;j++){

const key=localStorage.key(j)

if(key.startsWith("wowSlotPreset_")){

const opt=document.createElement("option")
opt.value=key
opt.text=key.replace("wowSlotPreset_","")

select.appendChild(opt)

}

}

}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){

const slots=[...document.querySelectorAll(".slot")]
let slotChoices=[]

slots.forEach(slot=>{

if(slot.querySelector(".pug").checked){

slotChoices.push("pug")

}else{

let specs=[]

slot.querySelectorAll(".classTick").forEach(classBox=>{

if(classBox.checked){

classBox.parentElement.nextElementSibling
.querySelectorAll(".specTick")
.forEach(spec=>{

if(spec.checked){

specs.push({
class:spec.dataset.class,
spec:spec.dataset.spec,
role:spec.dataset.role,
lust:spec.dataset.lust==="true",
brez:spec.dataset.brez==="true"
})

}

})

}

})

slotChoices.push(specs)

}

})

for(let attempt=0;attempt<10000;attempt++){

let group=[]

let roles=["tank","healer","dps","dps","dps"]

for(let i=roles.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
;[roles[i],roles[j]]=[roles[j],roles[i]]
}

for(let i=0;i<5;i++){

if(slotChoices[i]==="pug"){

group.push({pug:true,role:roles[i]})

}else{

const options=slotChoices[i].filter(o=>o.role===roles[i])

if(options.length===0) continue

group.push(random(options))

}

}

if(group.length<5)continue

if(document.getElementById("avoidDuplicateDPS").checked){

const dps=group.filter(g=>g.role==="dps" && !g.pug).map(g=>g.spec)

if(new Set(dps).size!==dps.length)continue

}

if(document.getElementById("lustRequired").checked){
if(!group.some(g=>g.lust))continue
}

if(document.getElementById("brezRequired").checked){
if(!group.some(g=>g.brez))continue
}

document.getElementById("result").innerHTML=
group.map((g,i)=>{

if(g.pug) return `Slot ${i+1}: PUG <span class="${g.role}">${g.role.toUpperCase()}</span>`

return `Slot ${i+1}: <span style="color:${classColors[g.class]}">${g.class}</span> <span class="${g.role}">${g.spec}</span>`

}).join("<br>")

return

}

document.getElementById("result").innerHTML="No valid group found."

}

</script>

</body>
</html>
