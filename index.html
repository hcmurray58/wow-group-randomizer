<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoW Group Randomizer</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:#eee;
    margin:20px;
}

.slot{
    border:1px solid #444;
    padding:10px;
    margin-bottom:15px;
}

.classRow{
    margin-bottom:6px;
}

.specs{
    display:none;
    margin-left:10px;
}

.specs label{
    margin-right:8px;
}

.tank{color:#4aa3ff;}
.healer{color:#3ddc84;}
.dps{color:#ff6b6b;}

button{
    padding:10px 18px;
    font-size:16px;
    margin-top:20px;
}

.result{
    margin-top:25px;
    font-size:18px;
}

</style>

</head>
<body>

<h1>WoW Group Randomizer</h1>

<label><input type="checkbox" id="lustRequired"> Require Lust</label><br>
<label><input type="checkbox" id="brezRequired"> Require Battle Rez</label><br>
<label><input type="checkbox" id="tankNonPug"> Tank must be non-pug</label><br>
<label><input type="checkbox" id="healerNonPug"> Healer must be non-pug</label>

<h2>Group Slots</h2>

<div id="slots"></div>

<button onclick="generate()">Generate Group</button>

<div class="result" id="result"></div>

<script>

const classColors={
Warrior:"#C79C6E",
Paladin:"#F58CBA",
Hunter:"#ABD473",
Rogue:"#FFF569",
Priest:"#FFFFFF",
DeathKnight:"#C41F3B",
Shaman:"#0070DE",
Mage:"#69CCF0",
Warlock:"#9482C9",
Monk:"#00FF96",
Druid:"#FF7D0A",
DemonHunter:"#A330C9",
Evoker:"#33937F"
}

const classes={

Warrior:[
{spec:"Protection",role:"tank"},
{spec:"Arms",role:"dps"},
{spec:"Fury",role:"dps"}
],

Paladin:[
{spec:"Protection",role:"tank"},
{spec:"Holy",role:"healer"},
{spec:"Retribution",role:"dps",brez:true}
],

Druid:[
{spec:"Guardian",role:"tank",brez:true},
{spec:"Restoration",role:"healer",brez:true},
{spec:"Balance",role:"dps",brez:true},
{spec:"Feral",role:"dps",brez:true}
],

Shaman:[
{spec:"Restoration",role:"healer",lust:true},
{spec:"Elemental",role:"dps",lust:true},
{spec:"Enhancement",role:"dps",lust:true}
],

Mage:[
{spec:"Arcane",role:"dps",lust:true},
{spec:"Fire",role:"dps",lust:true},
{spec:"Frost",role:"dps",lust:true}
],

Priest:[
{spec:"Holy",role:"healer"},
{spec:"Discipline",role:"healer"},
{spec:"Shadow",role:"dps"}
],

Monk:[
{spec:"Brewmaster",role:"tank"},
{spec:"Mistweaver",role:"healer"},
{spec:"Windwalker",role:"dps"}
],

DemonHunter:[
{spec:"Vengeance",role:"tank"},
{spec:"Havoc",role:"dps"}
],

DeathKnight:[
{spec:"Blood",role:"tank",brez:true},
{spec:"Frost",role:"dps",brez:true},
{spec:"Unholy",role:"dps",brez:true}
],

Evoker:[
{spec:"Preservation",role:"healer"},
{spec:"Devastation",role:"dps",lust:true},
{spec:"Augmentation",role:"dps",lust:true}
],

Hunter:[
{spec:"Beast Mastery",role:"dps",lust:true},
{spec:"Marksman",role:"dps",lust:true},
{spec:"Survival",role:"dps",lust:true}
],

Warlock:[
{spec:"Affliction",role:"dps",brez:true},
{spec:"Demonology",role:"dps",brez:true},
{spec:"Destruction",role:"dps",brez:true}
],

Rogue:[
{spec:"Assassination",role:"dps"},
{spec:"Outlaw",role:"dps"},
{spec:"Subtlety",role:"dps"}
]

}

function createSlots(){

const container=document.getElementById("slots")

for(let i=0;i<5;i++){

const slot=document.createElement("div")
slot.className="slot"

slot.innerHTML=`<b>Slot ${i+1}</b><br>
<label><input type="checkbox" class="pug"> PUG (anything)</label><br><br>
`

Object.keys(classes).forEach(cls=>{

const row=document.createElement("div")
row.className="classRow"

const classID=`slot${i}_${cls}`

let specHTML=""

classes[cls].forEach(spec=>{

specHTML+=`
<label class="${spec.role}">
<input type="checkbox"
class="specTick"
checked
data-class="${cls}"
data-spec="${spec.spec}"
data-role="${spec.role}"
data-lust="${spec.lust||false}"
data-brez="${spec.brez||false}">
${spec.spec}
</label>
`

})

row.innerHTML=`
<label style="color:${classColors[cls]}">
<input type="checkbox" class="classTick" id="${classID}">
${cls}
</label>

<span class="specs" id="${classID}_specs">
${specHTML}
</span>
`

slot.appendChild(row)

const classBox=row.querySelector(".classTick")
const specSpan=row.querySelector(".specs")

classBox.addEventListener("change",()=>{

if(classBox.checked){

specSpan.style.display="inline"

specSpan.querySelectorAll("input").forEach(s=>s.checked=true)

}else{

specSpan.style.display="none"

}

})

})

container.appendChild(slot)

}

}

createSlots()

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){

const slots=[...document.querySelectorAll(".slot")]

let slotChoices=[]

slots.forEach(slot=>{

if(slot.querySelector(".pug").checked){

let allSpecs=[]

Object.keys(classes).forEach(cls=>{
classes[cls].forEach(s=>{
allSpecs.push({...s,class:cls})
})
})

slotChoices.push(allSpecs)

}else{

let specs=[]

slot.querySelectorAll(".classTick").forEach(classBox=>{

if(classBox.checked){

const specContainer=classBox.parentElement.nextElementSibling

specContainer.querySelectorAll(".specTick").forEach(spec=>{
if(spec.checked){

specs.push({
class:spec.dataset.class,
spec:spec.dataset.spec,
role:spec.dataset.role,
lust:spec.dataset.lust==="true",
brez:spec.dataset.brez==="true"
})

}

})

}

})

slotChoices.push(specs)

}

})

for(let attempt=0;attempt<10000;attempt++){

let group=[]

for(let i=0;i<5;i++){

if(slotChoices[i].length===0) continue

group.push(random(slotChoices[i]))

}

if(group.length<5) continue

let tanks=group.filter(g=>g.role==="tank").length
let healers=group.filter(g=>g.role==="healer").length
let dps=group.filter(g=>g.role==="dps").length

if(tanks!==1||healers!==1||dps!==3) continue

if(document.getElementById("lustRequired").checked){
if(!group.some(g=>g.lust)) continue
}

if(document.getElementById("brezRequired").checked){
if(!group.some(g=>g.brez)) continue
}

document.getElementById("result").innerHTML=
group.map((g,i)=>`Slot ${i+1}: <span style="color:${classColors[g.class]}">${g.class}</span> <span class="${g.role}">${g.spec}</span>`).join("<br>")

return

}

document.getElementById("result").innerHTML="No valid group found."

}

</script>

</body>
</html>
