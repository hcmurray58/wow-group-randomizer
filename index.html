<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WoW Group Randomizer</title>

<style>
body{
  font-family:Arial;
  background:#050505; /* darker page background */
  color:#eee;
  margin:20px;
  padding-bottom:5cm; /* added ~5cm bottom space for easier scrolling */
}

/* Warcraft-like button styles (applied only to the specific buttons via classes) */
.wc-btn{
  padding:6px 12px;
  font-weight:700;
  font-family: "Trebuchet MS", Arial, sans-serif;
  color:#1b1300;
  border-radius:6px;
  cursor:pointer;
  transition: transform .06s ease, box-shadow .06s ease, filter .06s ease;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-shadow: 0 1px 0 rgba(255,255,255,0.18);
  border:1px solid #6b4a12;
  box-shadow: 0 5px 0 #5a3e10, 0 8px 20px rgba(0,0,0,0.45);
  background: linear-gradient(#f7df9a, #c28f25);
}
.wc-primary{
  background: linear-gradient(#ffd86b, #e09a2e);
  border-color: #7a5314;
  box-shadow: 0 6px 0 #664714, 0 12px 28px rgba(0,0,0,0.55);
  color:#0f0b00;
  font-size:15px;
}
.wc-small{
  padding:4px 8px;
  font-size:13px;
  border-radius:4px;
  box-shadow: 0 3px 0 #564012;
}
.wc-btn:hover{
  transform: translateY(-1px);
  filter:brightness(1.03);
  box-shadow: 0 8px 0 #5a3e10, 0 12px 26px rgba(0,0,0,0.45);
}
.wc-btn:active{
  transform: translateY(1px);
  box-shadow: 0 3px 0 #4a3008;
}
.wc-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  filter:grayscale(0.4) saturate(0.6);
}

/* input/select aesthetic to match Warcraft buttons */
.wc-input{
  padding:6px 10px;
  font-weight:700;
  font-family: "Trebuchet MS", Arial, sans-serif;
  font-size:13px;
  color:#1b1300;
  background: linear-gradient(#fff7df, #e0c07a);
  border:1px solid #6b4a12;
  border-radius:6px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 3px 0 #5a3e10;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}
.wc-input.small{
  padding:4px 8px;
  font-size:13px;
  border-radius:5px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 0 #5a3e10;
}
.wc-input:focus{
  outline:none;
  box-shadow: 0 6px 0 rgba(90,62,16,0.3);
}

/* updateToggle small button look */
.updateToggle{
  display:inline-block;
  padding:6px 10px;
  border-radius:6px;
  background: linear-gradient(#ffd86b, #e09a2e);
  color:#0f0b00;
  border:1px solid #7a5314;
  box-shadow: 0 3px 0 #664714;
  font-size:13px;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  vertical-align:middle;
}

/* center output & copy button using flex to ensure perfect centering */
.result{
  margin-top:25px;
  font-size:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.result img{
  display:block;
  margin:0 auto;
  max-width:100%;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.04);
}
/* ensure copy button sits centered beneath the image */
.result .wc-btn{
  display:inline-block;
  margin-top:6px;
}

#topControls{
  margin: 0 auto 12px;
  display: flex;
  flex-direction: column;
  align-items: center; /* keep the block centered on the page */
  gap: 4px;
}

/* make each label a fixed-width row so the checkbox column lines up */
#topControls label{
  width: 220px;           /* fixed width so inputs align vertically */
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-start; /* checkbox at same x for every row */
  padding: 2px 0;
  box-sizing: border-box;
  text-align: left;       /* keep label text left-aligned inside the fixed width */
}

#slots{
  margin: 0 auto;
  max-width: calc((180px + (120px + 3ch) * 4 + 48px) * 1.3);
  width: 100%;
  box-sizing: border-box;
}

/* center the primary generate button */
.wc-btn.wc-primary{
  display: block;
  margin: 12px auto;
}

/* center output and copy button */
.result{
  margin-top: 25px;
  font-size: 18px;
  text-align: center;
}
.result .wc-btn{
  display: inline-block;
  margin-top: 8px;
}

.slot{
  border:1px solid #4d4d4d; /* slightly lighter border (~10% lighter) */
  margin: 0 auto 10px;
  /* increase width by ~15% for a bit more room */
  max-width: calc((180px + (120px + 3ch) * 4 + 48px) * 1.3);
  width: 100%;
  box-sizing: border-box;
}

.slotHeader{
  background:#2b2b2b;
  padding:6px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center; /* centers everything horizontally */
  gap:8px;
  cursor:pointer;
}

.header-controls{
  display:flex;
  align-items:center;
  gap:8px;
}


.slotHeader .slotTitle{
  min-width:140px;
  font-weight:700;
  /* make slot title use the wc-input aesthetic so it visually matches the buttons/inputs */
  display:inline-block;
  padding:6px 10px;
  border-radius:6px;
  background: linear-gradient(#fff7df, #e0c07a);
  color:#1b1300;
  align-items:center;
  border:1px solid #6b4a12;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 3px 0 #5a3e10;
  font-weight:700;
}

.slotBody{
  padding:10px;
  /* remain visible; two states control which rows are shown */
}

/* align class column and spec column so tickboxes/names line up */
.classRow{
  margin-bottom:6px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}

/* class label column */
.classRow > label{
  display:inline-block;
  width:180px;          /* reduced so gap between class and specs is smaller */
  box-sizing:border-box;
  vertical-align:top;
}

/* hide the class checkbox input (class tickboxes not required any more) */
.classRow > label input.classTick{
  display:none;
}

/* specs column occupies remaining space and aligns */
.specs{
  display:inline-block;
  flex:1;
  min-width:0;
  box-sizing:border-box;
  margin-left:0;
}

/* keep key selectors pinned to the right edge of each row */
.classRow .keyDungeon{
  margin-left:auto;
}

.classRow .keyLevel{
  margin-left:0;
}

.specs label{
  margin-right:8px;
  display:inline-block;
  /* make spec labels 3 characters wider */
  min-width: calc(120px + 3ch);      /* keep spec labels consistent width for nicer alignment */
}

/* role colours */
.tank{color:#4aa3ff;}
.healer{color:#3ddc84;}
.dps{color:#ff6b6b;}

button{
  padding:4px 10px;
  margin-left:4px;
}

/* central alignment tweaks */
h1{
  text-align: center;
  margin-bottom: 12px;
}

#topControls{
  margin: 0 auto 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px; /* slightly tighter spacing between checkboxes */
}

#slots{
  margin: 0 auto;
  max-width: calc((180px + (120px + 3ch) * 4 + 48px) * 1.3);
  width: 100%;
  box-sizing: border-box;
}

/* center the primary generate button */
.wc-btn.wc-primary{
  display: block;
  margin: 12px auto;
}

/* center output and copy button */
.result{
  margin-top: 25px;
  font-size: 18px;
  text-align: center;
}
.result .wc-btn{
  display: inline-block;
  margin-top: 8px;
}

/* ensure each slot remains centered */
.slot{
  margin: 0 auto 10px;
}
</style>
</head>
<body>

<!-- replaced text title with image -->
<h1><img src="WoW-Group-Randomizer.png" alt="WoW Group Randomizer" style="height:100px"></h1>

<div id="slots"></div>

<!-- moved the five top checkboxes here (below slots, above generate button) -->
<div id="topControls">
  <label><input type="checkbox" id="tankNonPugRequired"> Tank must be non-PUG</label>
  <label><input type="checkbox" id="healerNonPugRequired"> Healer must be non-PUG</label>
  <label><input type="checkbox" id="lustRequired"> Require Lust</label>
  <label><input type="checkbox" id="brezRequired"> Require Battle Rez</label>
  <label><input type="checkbox" id="avoidDuplicateDPS"> Avoid duplicate DPS specs</label>
</div>

<button class="wc-btn wc-primary" onclick="generate()">Generate Group</button>

<div class="result" id="result"></div>

<script>
const classColors={
  Warrior:"#C79C6E",
  Paladin:"#F58CBA",
  Hunter:"#ABD473",
  Rogue:"#FFF569",
  Priest:"#FFFFFF",
  "Death Knight":"#C41F3B",
  Shaman:"#0070DE",
  Mage:"#69CCF0",
  Warlock:"#9482C9",
  Monk:"#00FF96",
  Druid:"#FF7D0A",
  "Demon Hunter":"#A330C9",
  Evoker:"#33937F"
}

const classes={
  Warrior:[
    {spec:"Protection",role:"tank"},
    {spec:"Arms",role:"dps"},
    {spec:"Fury",role:"dps"}
  ],
  Paladin:[
    {spec:"Protection",role:"tank",brez:true},
    {spec:"Holy",role:"healer",brez:true},
    {spec:"Retribution",role:"dps",brez:true}
  ],
  Druid:[
    {spec:"Guardian",role:"tank",brez:true},
    {spec:"Restoration",role:"healer",brez:true},
    {spec:"Balance",role:"dps",brez:true},
    {spec:"Feral",role:"dps",brez:true}
  ],
  Shaman:[
    {spec:"Restoration",role:"healer",lust:true},
    {spec:"Elemental",role:"dps",lust:true},
    {spec:"Enhancement",role:"dps",lust:true}
  ],
  Mage:[
    {spec:"Arcane",role:"dps",lust:true},
    {spec:"Fire",role:"dps",lust:true},
    {spec:"Frost",role:"dps",lust:true}
  ],
  Priest:[
    {spec:"Holy",role:"healer"},
    {spec:"Discipline",role:"healer"},
    {spec:"Shadow",role:"dps"}
  ],
  Monk:[
    {spec:"Brewmaster",role:"tank"},
    {spec:"Mistweaver",role:"healer"},
    {spec:"Windwalker",role:"dps"}
  ],
  "Demon Hunter":[
    {spec:"Vengeance",role:"tank"},
    {spec:"Havoc",role:"dps"},
    {spec:"Devourer",role:"dps"}
  ],
  "Death Knight":[
    {spec:"Blood",role:"tank",brez:true},
    {spec:"Frost",role:"dps",brez:true},
    {spec:"Unholy",role:"dps",brez:true}
  ],
  Evoker:[
    {spec:"Preservation",role:"healer",lust:true},
    {spec:"Devastation",role:"dps",lust:true},
    {spec:"Augmentation",role:"dps",lust:true}
  ],
  Hunter:[
    {spec:"Beast Mastery",role:"dps",lust:true},
    {spec:"Marksman",role:"dps",lust:true},
    {spec:"Survival",role:"dps",lust:true}
  ],
  Warlock:[
    {spec:"Affliction",role:"dps",brez:true},
    {spec:"Demonology",role:"dps",brez:true},
    {spec:"Destruction",role:"dps",brez:true}
  ],
  Rogue:[
    {spec:"Assassination",role:"dps"},
    {spec:"Outlaw",role:"dps"},
    {spec:"Subtlety",role:"dps"}
  ]
}

function createSlots(){
  const container=document.getElementById("slots")

  for(let i=0;i<5;i++){
    const slot=document.createElement("div")
    slot.className="slot"

    // header toggles the slot state. individual controls stopPropagation so interacting them doesn't toggle.
    slot.innerHTML=`
      <div class="slotHeader" onclick="toggleState(${i})">
        <span class="slotTitle">Slot ${i+1}</span>
        <div class="header-controls">
          <label style="margin-right:6px"><input type="checkbox" class="pug" onchange="onPugToggle(${i})" onclick="event.stopPropagation()"> PUG</label>
          <select class="presetSelect wc-input small" onchange="presetSelected(${i})" onclick="event.stopPropagation()"></select>
          <span class="updateToggle" onclick="toggleState(${i}); event.stopPropagation()">Update</span>
          <input type="text" placeholder="Preset name" class="presetName wc-input" onclick="event.stopPropagation()">
          <button class="wc-btn wc-small" onclick="savePreset(${i}); event.stopPropagation();">Save</button>
        </div>
      </div>
      <div class="slotBody">
        <div class="classList"></div>
      </div>
    `

    const body=slot.querySelector(".slotBody")
    const classList=slot.querySelector(".classList")

    Object.keys(classes).forEach(cls=>{
      const row=document.createElement("div")
      row.className="classRow"

      let specHTML=""
      classes[cls].forEach(spec=>{
        specHTML+=`
          <label class="specLabel ${spec.role}">
            <input type="checkbox"
              class="specTick"
              data-class="${cls}"
              data-spec="${spec.spec}"
              data-role="${spec.role}"
              data-lust="${spec.lust||false}"
              data-brez="${spec.brez||false}">
            ${spec.spec}
          </label>
        `
      })

      row.innerHTML=`
        <label style="color:${classColors[cls]}">
          <input type="checkbox" class="classTick" onclick="event.stopPropagation()">
          ${cls}
        </label>

        <span class="specs">${specHTML}</span>

        <select class="keyDungeon wc-input small">
          <option value="">No Key</option>
          <option>Magisters' Terrace</option>
          <option>Maisara Caverns</option>
          <option>Nexus-Point Xenas</option>
          <option>Windrunner Spire</option>
          <option>Algeth'ar Academy</option>
          <option>Pit of Saron</option>
          <option>Seat of the Triumvirate</option>
          <option>Skyreach</option>
        </select>

        <select class="keyLevel wc-input small">
          <option value="">Lvl</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6</option>
          <option>7</option>
          <option>8</option>
          <option>9</option>
          <option>10</option>
          <option>11</option>
          <option>12</option>
          <option>13</option>
          <option>14</option>
          <option>15</option>
          <option>16</option>
          <option>17</option>
          <option>18</option>
          <option>19</option>
          <option>20</option>
        </select>

        
      `
      classList.appendChild(row)

      const classBox=row.querySelector(".classTick")
      const specSpan=row.querySelector(".specs")

      // start unchecked and specs hidden
      classBox.checked = false
      specSpan.style.display = "none"
      row.querySelectorAll(".specTick").forEach(s=>s.checked = false)

      // class tickboxes are hidden and not required; visibility controlled by spec ticks + state

      // spec change: if any spec is checked then clear PUG for that slot and enable UI; always ensure state applied
      row.querySelectorAll('.specTick').forEach(s=>{
        s.addEventListener('change', ()=>{
          const slotElem = row.closest('.slot')
          const idx = Array.prototype.indexOf.call(document.querySelectorAll('.slot'), slotElem)
          const pugBox = slotElem.querySelector('.pug')
          if(s.checked && pugBox && pugBox.checked){
            pugBox.checked = false
            onPugToggle(idx)
          }
          // when a spec changes ensure state rules applied so specs visibility updates
          applyState(idx)

          // autosave on spec select/unselect for named presets
          savePreset(idx)
        })
      })

      // autosave on key dungeon/key level change for named presets
      const keyDungeonSelect = row.querySelector('.keyDungeon')
      const keyLevelSelect = row.querySelector('.keyLevel')
      if(keyDungeonSelect){
        keyDungeonSelect.addEventListener('change', ()=> savePreset(i))
      }
      if(keyLevelSelect){
        keyLevelSelect.addEventListener('change', ()=> savePreset(i))
      }
    })

    container.appendChild(slot)
    updatePresetDropdown(i)

    // make the preset name input update the header live
    const nameInput = slot.querySelector('.presetName')
    nameInput.addEventListener('input', ()=> updateSlotTitle(i))

    // set initial state: selected-only (State 1)
    slot.dataset.state = 'selected-only'
    applyState(i)

    // start with PUG checked for all slots
    const pugBox = slot.querySelector(".pug")
    if(pugBox){
      pugBox.checked = true
      onPugToggle(i)
    }

    updateSlotTitle(i)
  }
}

createSlots()

function presetSelected(i){
  const slot=document.querySelectorAll(".slot")[i]
  const sel=slot.querySelector(".presetSelect")
  const nameInput=slot.querySelector(".presetName")

  // put selected preset name into text box (remove prefix)
  if(sel.value){
    nameInput.value = sel.value.replace("wowSlotPreset_","")
  } else {
    nameInput.value = ""
  }

  // ensure PUG is cleared when selecting a preset
  const pugBox = slot.querySelector(".pug")
  if(pugBox){
    pugBox.checked = false
    onPugToggle(i)
  }

  // load immediately
  loadPreset(i)
  updateSlotTitle(i)

  // refresh all dropdowns so chosen name can't be picked in other slots
  document.querySelectorAll('.slot').forEach((_, idx) => updatePresetDropdown(idx))
}

function onPugToggle(i){
  const slot=document.querySelectorAll(".slot")[i]
  const pug=slot.querySelector(".pug").checked
  const classList=slot.querySelector(".classList")
  const state = slot.dataset.state || 'selected-only'

  if(pug){
    // Reset all slot inputs when PUG is ticked:
    // - clear preset dropdown and name
    // - uncheck all class checkboxes and spec checkboxes
    // - hide class list if in selected-only state, otherwise leave hidden but disabled
    const sel = slot.querySelector(".presetSelect")
    const name = slot.querySelector(".presetName")
    if(sel) sel.value = ""
    if(name) name.value = ""

    slot.querySelectorAll(".classRow").forEach(row=>{
      const classTick = row.querySelector(".classTick")
      const specInputs = row.querySelectorAll(".specTick")
      if(classTick) classTick.checked = false
      specInputs.forEach(s=> s.checked = false)
      // hide specs and rows while pug is active
      const specSpan = row.querySelector(".specs")
      if(specSpan) specSpan.style.display = "none"
      row.style.display = "none"
      // ensure spec labels are visible when class is later selected (reset any inline hiding)
      row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
    })

    // hide and disable class list when PUG is checked in selected-only state
    if(state === 'selected-only'){
      classList.style.display="none"
      classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
    } else {
      // in 'all' state keep class list visually available but inputs disabled
      classList.style.display="block"
      classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
    }
  } else {
    // Re-enable UI when PUG cleared. Restore visibility according to current state.
    classList.style.display="block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=false)
    applyState(i)
  }
  updateSlotTitle(i)
}

// toggle between two states:
// 'selected-only' (State 1): show only selected classes and all their specs
// 'all' (State 2): show all classes; selected classes show their specs
function toggleState(i){
  const slot=document.querySelectorAll(".slot")[i]
  const current = slot.dataset.state || 'selected-only'
  const next = current === 'selected-only' ? 'all' : 'selected-only'
  slot.dataset.state = next
  applyState(i)
  updateSlotTitle(i)
}

function applyState(i){
  const slot = document.querySelectorAll(".slot")[i]
  if(!slot) return
  const state = slot.dataset.state || 'selected-only'
  const classRows = slot.querySelectorAll(".classRow")
  classRows.forEach(row=>{
    const specSpan = row.querySelector(".specs")
    const anySpecChecked = row.querySelectorAll('.specTick:checked').length > 0

    if(state === 'all'){
      // show every class row and show all spec labels
      row.style.display = "flex"
      if(specSpan) specSpan.style.display = "inline"
      row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
    } else {
      // selected-only: only show rows where at least one spec is checked; show all specs for those
      if(anySpecChecked){
        row.style.display = "flex"
        if(specSpan) specSpan.style.display = "inline"
        row.querySelectorAll(".specLabel").forEach(lbl=> lbl.style.display = "")
      } else {
        row.style.display = "none"
        if(specSpan) specSpan.style.display = "none"
      }
    }
  })

  // classList visibility depends on state and pug
  const classList = slot.querySelector(".classList")
  if(state === 'all'){
    classList.style.display = "block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled = false)
  } else {
    // selected-only: hide classList entirely if PUG checked, otherwise show it (but rows filtered above)
    if(slot.querySelector(".pug") && slot.querySelector(".pug").checked){
      classList.style.display = "none"
    } else {
      classList.style.display = "block"
    }
  }
}

function updateSlotTitle(i){
  const slot=document.querySelectorAll(".slot")[i]
  const titleEl=slot.querySelector(".slotTitle")

  if(slot.querySelector(".pug").checked){
    titleEl.textContent=`PUG`
    return
  }

  const selectVal = slot.querySelector(".presetSelect").value
  const nameInputVal = slot.querySelector(".presetName").value.trim()

  if(selectVal){
    titleEl.textContent = selectVal.replace("wowSlotPreset_","")
  } else if(nameInputVal){
    titleEl.textContent = nameInputVal
  } else {
    titleEl.textContent = `Slot ${i+1}`
  }
}

// helper to get the canonical slot name (without appended class list)
function getSlotName(slot, i){
  if(slot.querySelector(".pug") && slot.querySelector(".pug").checked) return "PUG"
  const nameInputVal = slot.querySelector(".presetName") && slot.querySelector(".presetName").value.trim()
  const selectVal = slot.querySelector(".presetSelect") && slot.querySelector(".presetSelect").value
  if(nameInputVal) return nameInputVal
  if(selectVal) return selectVal.replace("wowSlotPreset_","")
  return `Slot ${i+1}`
}

function savePreset(i){
  const slot=document.querySelectorAll(".slot")[i]
  const name=slot.querySelector(".presetName").value
  if(!name) return

  let preset=[]
  slot.querySelectorAll(".classRow").forEach(row=>{
    const classTick = row.querySelector(".classTick")
    const specInputs = [...row.querySelectorAll(".specTick")]
    const keyDungeon = row.querySelector(".keyDungeon")
    const keyLevel = row.querySelector(".keyLevel")
    preset.push({
      classEnabled: classTick.checked,
      keyDungeon: keyDungeon ? keyDungeon.value : "",
      keyLevel: keyLevel ? keyLevel.value : "",
      specs: specInputs.map(s=>({checked:s.checked}))
    })
  })

  localStorage.setItem("wowSlotPreset_"+name,JSON.stringify(preset))
  // refresh all dropdowns so the new name is reflected and disabled in other slots
  document.querySelectorAll('.slot').forEach((_, idx) => updatePresetDropdown(idx))
  slot.querySelector(".presetSelect").value="wowSlotPreset_"+name

  updateSlotTitle(i)
}

function getWeightsKey(slotName){
  return "wowWeights_" + slotName
}

function loadWeights(slotName){
  const raw = localStorage.getItem(getWeightsKey(slotName))
  return raw ? JSON.parse(raw) : {}
}

function saveWeights(slotName, weights){
  localStorage.setItem(getWeightsKey(slotName), JSON.stringify(weights))
}

function getSpecKey(spec){
  return spec.class + "|" + spec.spec
}

function getRoleWeightsKey(slotName){
  return "wowRoleWeights_" + slotName
}

function loadRoleWeights(slotName){
  const raw = localStorage.getItem(getRoleWeightsKey(slotName))
  return raw ? JSON.parse(raw) : { tank:1, healer:1, dps:1 }
}

function saveRoleWeights(slotName, weights){
  localStorage.setItem(getRoleWeightsKey(slotName), JSON.stringify(weights))
}

function weightedRandomRole(roleWeights){
  const entries = Object.entries(roleWeights)
  let total = 0

  entries.forEach(([role, w]) => total += w)

  let r = Math.random() * total

  for(const [role, w] of entries){
    if(r < w) return role
    r -= w
  }

  return entries[0][0]
}

function weightedRandom(options, weights){
  let total = 0
  const weighted = options.map(o=>{
    const key = getSpecKey(o)
    const w = weights[key] || 0.1
    total += w
    return {option:o, weight:w}
  })

  let r = Math.random() * total

  for(const entry of weighted){
    if(r < entry.weight){
      return entry.option
    }
    r -= entry.weight
  }

  return weighted[0].option
}

function loadPreset(i){
  const slot=document.querySelectorAll(".slot")[i]
  const key=slot.querySelector(".presetSelect").value
  if(!key) return
  const raw = localStorage.getItem(key)
  if(!raw) return
  const preset=JSON.parse(raw)

  const classRows = slot.querySelectorAll(".classRow")
  let anySpecChecked = false
  classRows.forEach((row, index)=>{
    const entry = preset[index]
    const classTick = row.querySelector(".classTick")
    const specInputs = [...row.querySelectorAll(".specTick")]
    const specSpan = row.querySelector(".specs")
    const keyDungeon = row.querySelector(".keyDungeon")
    const keyLevel = row.querySelector(".keyLevel")

    if(!entry){
      classTick.checked = false
      row.style.display = "none"
      specInputs.forEach(s=>{
        s.checked=false
        s.parentElement.style.display = ""
      })
      if(keyDungeon) keyDungeon.value = ""
      if(keyLevel) keyLevel.value = ""
      if(specSpan) specSpan.style.display = "none"
      return
    }

    classTick.checked = !!entry.classEnabled

    // Restore checked states for specs but always show spec labels for selected classes
    specInputs.forEach((s, si)=>{
      const specEntry = entry.specs && entry.specs[si]
      s.checked = !!(specEntry && specEntry.checked)
      if(s.checked) anySpecChecked = true
      s.parentElement.style.display = ""
    })

    if(keyDungeon) keyDungeon.value = entry.keyDungeon || ""
    if(keyLevel) keyLevel.value = entry.keyLevel || ""

    if(classTick.checked){
      row.style.display = "flex"
      if(specSpan) specSpan.style.display = "inline"
    } else {
      row.style.display = "none"
      if(specSpan) specSpan.style.display = "none"
    }
  })

  // if any spec restored as checked, clear PUG and ensure UI enabled
  const pugBox = slot.querySelector(".pug")
  if(anySpecChecked && pugBox && pugBox.checked){
    pugBox.checked = false
    onPugToggle(i)
  }

  // if pug is checked, hide entire class list only if in selected-only state
  const classList = slot.querySelector(".classList")
  if(slot.querySelector(".pug").checked && slot.dataset.state === 'selected-only'){
    classList.style.display="none"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=true)
  } else {
    classList.style.display="block"
    classList.querySelectorAll("input").forEach(inp=>inp.disabled=false)
  }

  // set name input to selected preset name
  slot.querySelector(".presetName").value = key.replace("wowSlotPreset_","")

  // keep state as selected-only after load
  slot.dataset.state = 'selected-only'
  applyState(i)
  updateSlotTitle(i)
}

function updatePresetDropdown(i){
  const slot=document.querySelectorAll(".slot")[i]
  const select=slot.querySelector(".presetSelect")
  const prevValue = select.value || ""
  select.innerHTML=""
  const newOpt=document.createElement("option")
  newOpt.value=""
  newOpt.text="New"
  select.appendChild(newOpt)

  // collect preset keys and sort alphabetically by display name
  const presets=[]
  for(let j=0;j<localStorage.length;j++){
    const key=localStorage.key(j)
    if(key.startsWith("wowSlotPreset_")){
      presets.push(key)
    }
  }
  presets.sort((a,b)=>{
    const aName = a.replace("wowSlotPreset_","").toLowerCase()
    const bName = b.replace("wowSlotPreset_","").toLowerCase()
    return aName.localeCompare(bName)
  })

  // collect other slots' current selections so we can disable those options here
  const otherSelected = new Set(
    [...document.querySelectorAll('.presetSelect')]
      .map(s => s.value)
      .filter(v => v && v !== prevValue)
  )

  presets.forEach(key=>{
    const opt=document.createElement("option")
    opt.value=key
    opt.text=key.replace("wowSlotPreset_","")
    // disable option if another slot (not this one) already has it selected
    if(otherSelected.has(key)) opt.disabled = true
    select.appendChild(opt)
  })

  select.value = prevValue && [...select.options].some(o=>o.value===prevValue) ? prevValue : ""
}

function random(arr){ return arr[Math.floor(Math.random()*arr.length)] }

function padRight(str, width){
  str = String(str);
  if(str.length >= width) return str;
  return str + " ".repeat(width - str.length);
}

function generate(){
  const slots=[...document.querySelectorAll(".slot")]
  let slotChoices=[]

  // ensure we have index so we can update slot UI when treating empty as PUG
  slots.forEach((slot, idx)=>{
    if(slot.querySelector(".pug").checked){
      slotChoices.push("pug")
    } else {
      let specs=[]
      slot.querySelectorAll(".classRow").forEach(row=>{
        // collect spec ticks regardless of class tickboxes or visibility
        row.querySelectorAll(".specTick").forEach(spec=>{
          if(spec.checked){
            specs.push({
              class:spec.dataset.class,
              spec:spec.dataset.spec,
              role:spec.dataset.role,
              lust:spec.dataset.lust==="true",
              brez:spec.dataset.brez==="true"
            })
          }
        })
      })
      // if no user choices treat as PUG and update the slot UI
      if(specs.length===0){
        const pugBox = slot.querySelector(".pug")
        if(pugBox){
          pugBox.checked = true
          onPugToggle(idx)
        }
        slotChoices.push("pug")
      } else {
        slotChoices.push(specs)
      }
    }
  })

  // Pre-compute what roles each slot can actually fill
  const possibleRoles = slotChoices.map(choice => {
    if(choice === "pug") return ["tank", "healer", "dps"]
    return [...new Set(choice.map(s => s.role))]
  })

  // forcedRoles still used below when updating role weights
  const forcedRoles = possibleRoles.map(pr => pr.length === 1 ? pr[0] : null)

  for(let attempt=0;attempt<10000;attempt++){
    let group=[]

    // Weighted backtracking role assignment — always finds a valid assignment if one exists.
    // For each slot try roles in a weighted-random order; backtrack if a branch dead-ends.
    const rolesPool = ["tank","healer","dps","dps","dps"]
    const roles = []

    function assignRoles(slotIdx){
      if(slotIdx === 5) return rolesPool.length === 0
      const available = possibleRoles[slotIdx].filter(r => rolesPool.includes(r))
      if(available.length === 0) return false

      // Build a weighted-random ordering of the available roles to try
      const slotName = getSlotName(slots[slotIdx], slotIdx)
      const roleWeights = loadRoleWeights(slotName)
      const weighted = available.map(r => ({ r, w: roleWeights[r] || 1 }))
      const order = []
      while(weighted.length > 0){
        let total = weighted.reduce((s, x) => s + x.w, 0)
        let rnd = Math.random() * total
        let idx = weighted.length - 1
        for(let j = 0; j < weighted.length; j++){
          rnd -= weighted[j].w
          if(rnd <= 0){ idx = j; break }
        }
        order.push(weighted[idx].r)
        weighted.splice(idx, 1)
      }

      for(const role of order){
        const pi = rolesPool.indexOf(role)
        rolesPool.splice(pi, 1)
        roles.push(role)
        if(assignRoles(slotIdx + 1)) return true
        roles.pop()
        rolesPool.splice(pi, 0, role)
      }
      return false
    }

    if(!assignRoles(0)) continue

    for(let i=0;i<5;i++){
      if(slotChoices[i]==="pug"){
        group.push({pug:true, role:roles[i], slotIndex:i})
      } else {
        const options=slotChoices[i].filter(o=>o.role===roles[i])
        if(options.length===0) continue
        // clone chosen option and attach slot index
        const slotName = getSlotName(slots[i], i)
        const weights = loadWeights(slotName)

        const lastGroup = window.lastGroup || []

      // find last spec for this slot
      const lastPick = lastGroup.find(g => 
        !g.pug && g.slotIndex === i
      )

      // try to avoid same spec
      let filteredOptions = options

      if(lastPick){
        const withoutRepeat = options.filter(o => o.spec !== lastPick.spec)

        // only use filtered list if it still has options
        if(withoutRepeat.length > 0){
          filteredOptions = withoutRepeat
        }
      }

      // now roll normally
      const picked = weightedRandom(filteredOptions, weights)
        const chosen = {...picked, slotIndex:i}
        group.push(chosen)
      }
    }

    if(group.length<5) continue

    if(document.getElementById("tankNonPugRequired").checked){
      if(group.some(g=>g.role==="tank" && g.pug)) continue
    }
    if(document.getElementById("healerNonPugRequired").checked){
      if(group.some(g=>g.role==="healer" && g.pug)) continue
    }
    if(document.getElementById("avoidDuplicateDPS").checked){
      const dps=group.filter(g=>g.role==="dps" && !g.pug).map(g=>g.spec)
      if(new Set(dps).size!==dps.length) continue
    }
    if(document.getElementById("lustRequired").checked){
      if(!group.some(g=>g.lust)) continue
    }
    if(document.getElementById("brezRequired").checked){
      if(!group.some(g=>g.brez)) continue
    }

    // Build nicely aligned lines using slot names and keep colouring for class + spec and role
    const lineHeight = 20
    const font = "14px monospace"

    function formatRole(role){
      if(!role) return ""
      if(role==="dps") return "DPS"
      return role.charAt(0).toUpperCase()+role.slice(1)
    }

    // sort: Tank, Healer, then DPS alphabetical by slot name
    const rolePriority = {tank:0, healer:1, dps:2}
    const sortedGroup = [...group].sort((a,b) => {
      const pa = rolePriority[a.role] ?? 99
      const pb = rolePriority[b.role] ?? 99
      if (pa !== pb) return pa - pb

      // same role
      // For DPS: non-PUGs first (alphabetical), then PUG DPS last
      if (a.role === 'dps' && b.role === 'dps') {
        if (!!a.pug !== !!b.pug) return a.pug ? 1 : -1
        const nameA = getSlotName(slots[a.slotIndex], a.slotIndex)
        const nameB = getSlotName(slots[b.slotIndex], b.slotIndex)
        return nameA.localeCompare(nameB)
      }

      // Non-DPS: alphabetical by slot name
      const nameA = getSlotName(slots[a.slotIndex], a.slotIndex)
      const nameB = getSlotName(slots[b.slotIndex], b.slotIndex)
      return nameA.localeCompare(nameB)
    })

    // Prepare structured lines for text fallback and image rendering
    const linesData = sortedGroup.map(g=>{
      return {
        slotName: getSlotName(slots[g.slotIndex], g.slotIndex),
        role: g.role || "",
        roleText: formatRole(g.role),
        className: g.class || "",
        specName: g.spec || "",
        color: classColors[g.class] || '#fff',
        isPug: !!g.pug,
        slotIndex: g.slotIndex
      }
    })

    // determine column widths dynamically so columns line up vertically,
    // with at least a 3-character gap between columns
    const tempCanvas = document.createElement('canvas')
    const tempCtx = tempCanvas.getContext('2d')
    tempCtx.font = font
    const charW = tempCtx.measureText('M').width
    const minGap = 3 * charW

    const measureNameW = (t) => tempCtx.measureText((t||'') + ':').width
    const measureRoleW = (t) => tempCtx.measureText(t||'').width
    const measureClassW = (t) => tempCtx.measureText(t||'').width
    const measureSpecW = (t) => tempCtx.measureText(t||'').width

    const maxNameW = Math.max(0, ...linesData.map(ld => measureNameW(ld.slotName)))
    const maxRoleW = Math.max(0, ...linesData.map(ld => measureRoleW(ld.roleText)))
    const maxClassW = Math.max(0, ...linesData.map(ld => measureClassW(ld.className)))
    const maxSpecW = Math.max(0, ...linesData.map(ld => measureSpecW(ld.specName)))

    const nameFieldWidth = Math.ceil(maxNameW + minGap)
    const roleFieldWidth = Math.ceil(maxRoleW + minGap)
    const classFieldWidth = Math.ceil(maxClassW + minGap)

    const leftPadding = 10
    const rightPadding = 10

    // compute footer lines (Lust + Brez + optional requirement status lines)
    const requireLust = document.getElementById("lustRequired").checked
    const requireBrez = document.getElementById("brezRequired").checked
    let footerLines = 2
    if(requireLust) footerLines += 1
    if(requireBrez) footerLines += 1

    const canvasWidth = leftPadding + nameFieldWidth + roleFieldWidth + classFieldWidth + maxSpecW + rightPadding + 6
    const canvasHeight = 10 + linesData.length * lineHeight + footerLines * lineHeight + 10
    const canvas = document.createElement('canvas')
    canvas.width = Math.max(300, Math.ceil(canvasWidth))
    canvas.height = Math.ceil(canvasHeight)
    const ctx = canvas.getContext('2d')

    // Aesthetic background: rounded panel with subtle gradient and border.
    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.max(0, Math.min(r, w / 2, h / 2))
      ctx.beginPath()
      ctx.moveTo(x + rr, y)
      ctx.arcTo(x + w, y, x + w, y + h, rr)
      ctx.arcTo(x + w, y + h, x, y + h, rr)
      ctx.arcTo(x, y + h, x, y, rr)
      ctx.arcTo(x, y, x + w, y, rr)
      ctx.closePath()
    }

    const inset = 6
    const panelX = inset
    const panelY = inset
    const panelW = canvas.width - inset * 2
    const panelH = canvas.height - inset * 2

    // subtle vertical gradient
    const g = ctx.createLinearGradient(0, panelY, 0, panelY + panelH)
    g.addColorStop(0, "#161616")
    g.addColorStop(1, "#0b0b0b")

    roundRect(ctx, panelX, panelY, panelW, panelH, 8)
    ctx.fillStyle = g
    ctx.fill()

    // button-style border
    ctx.lineWidth = 2
    ctx.strokeStyle = "#7a5314"
    ctx.stroke()

    // subtle outer shadow edge like WC buttons
    ctx.lineWidth = 1
    ctx.strokeStyle = "#3f2a08"
    roundRect(ctx, panelX-1, panelY-1, panelW+2, panelH+2, 8)
    ctx.stroke()

    // compute column X positions (so separators can use them)
    const xName = leftPadding
    const xRole = xName + nameFieldWidth
    const xClass = xRole + roleFieldWidth
    const xSpec = xClass + classFieldWidth

    // subtle column separators to aid alignment
    ctx.save()
    ctx.globalAlpha = 0.06
    ctx.strokeStyle = "#ffffff"
    ctx.lineWidth = 1
    ctx.beginPath()
    ctx.moveTo(xRole - 6, panelY + 8)
    ctx.lineTo(xRole - 6, panelY + panelH - 8)
    ctx.moveTo(xClass - 6, panelY + 8)
    ctx.lineTo(xClass - 6, panelY + panelH - 8)
    ctx.stroke()
    ctx.restore()

    // // header subtle title (optional, small)
    // ctx.font = "bold 12px sans-serif"
    // ctx.fillStyle = "rgba(255,255,255,0.85)"
    // const title = "Group"
    // ctx.fillText(title, panelX + 12, panelY + 8)

    // restore monospace for the table text
    ctx.font = font
    ctx.textBaseline = "top"

    // draw each line using computed column X positions
    const rowTop = panelY + 10
    linesData.forEach((ld, idx) => {
      const y = rowTop + idx * lineHeight
      // name
      ctx.fillStyle = "#eee"
      ctx.fillText(ld.slotName + ":", xName, y)

      // role (tank/ healer / DPS - DPS red)
      const roleColor = ld.role === 'tank' ? '#4aa3ff' : (ld.role === 'healer' ? '#3ddc84' : '#ff6b6b')
      ctx.fillStyle = roleColor
      ctx.fillText(ld.roleText, xRole, y)

      if(ld.isPug) return

      // class and spec
      ctx.fillStyle = ld.color
      ctx.fillText(ld.className, xClass, y)
      // draw spec using same colour as the class
      ctx.fillStyle = ld.color
      ctx.fillText(ld.specName, xSpec, y)
    })

    // lightly separate rows with tiny dividers for readability
    ctx.save()
    ctx.globalAlpha = 0.03
    ctx.strokeStyle = "#000"
    for (let i = 0; i < linesData.length; i++) {
      const y = rowTop + (i + 1) * lineHeight - 6
      ctx.beginPath()
      ctx.moveTo(panelX + 8, y)
      ctx.lineTo(panelX + panelW - 8, y)
      ctx.stroke()
    }
    ctx.restore()

    // providers info at bottom
    const lustProvidersData = linesData.filter(ld=>{
      if(ld.isPug) return false
      const cls = classes[ld.className] || []
      const specEntry = cls.find(s=>s.spec===ld.specName) || {}
      return !!specEntry.lust
    }).map(ld=>({ name: ld.slotName, color: classColors[ld.className] || '#eee' }))

    const brezProvidersData = linesData.filter(ld=>{
      if(ld.isPug) return false
      const cls = classes[ld.className] || []
      const specEntry = cls.find(s=>s.spec===ld.specName) || {}
      return !!specEntry.brez
    }).map(ld=>({ name: ld.slotName, color: classColors[ld.className] || '#eee' }))

    let footerY = 10 + linesData.length * lineHeight + 6
    // Lust providers line: label then coloured names
    ctx.fillStyle = "#eee"
    const lustLabel = "Lust providers: "
    ctx.fillText(lustLabel, leftPadding, footerY)
    let x = leftPadding + ctx.measureText(lustLabel).width
    if(lustProvidersData.length === 0){
      ctx.fillStyle = "#eee"
      ctx.fillText("(none)", x, footerY)
    } else {
      lustProvidersData.forEach((p, idx)=>{
        ctx.fillStyle = p.color
        ctx.fillText(p.name, x, footerY)
        x += ctx.measureText(p.name).width
        if(idx < lustProvidersData.length - 1){
          ctx.fillStyle = "#eee"
          const sep = ", "
          ctx.fillText(sep, x, footerY)
          x += ctx.measureText(sep).width
        }
      })
    }
    footerY += lineHeight

    // Battle Rez providers line
    ctx.fillStyle = "#eee"
    const brezLabel = "Battle Rez providers: "
    ctx.fillText(brezLabel, leftPadding, footerY)
    x = leftPadding + ctx.measureText(brezLabel).width
    if(brezProvidersData.length === 0){
      ctx.fillStyle = "#eee"
      ctx.fillText("(none)", x, footerY)
    } else {
      brezProvidersData.forEach((p, idx)=>{
        ctx.fillStyle = p.color
        ctx.fillText(p.name, x, footerY)
        x += ctx.measureText(p.name).width
        if(idx < brezProvidersData.length - 1){
          ctx.fillStyle = "#eee"
          const sep = ", "
          ctx.fillText(sep, x, footerY)
          x += ctx.measureText(sep).width
        }
      })
    }
    footerY += lineHeight

    // (requireLust / requireBrez already read above)
    if(requireLust || requireBrez){
      if(requireLust){
        ctx.fillStyle = (lustProvidersData.length ? "#3ddc84" : "#ff6b6b")
        ctx.fillText("Lust: " + (lustProvidersData.length ? "OK" : "MISSING"), leftPadding, footerY)
        footerY += lineHeight
      }
      if(requireBrez){
        ctx.fillStyle = (brezProvidersData.length ? "#3ddc84" : "#ff6b6b")
        ctx.fillText("Battle Rez: " + (brezProvidersData.length ? "OK" : "MISSING"), leftPadding, footerY)
        footerY += lineHeight
      }
    }

    // show both image and text fallback; add copy button
    const resultDiv = document.getElementById("result")
    resultDiv.innerHTML = ""

    // image only
    const img = document.createElement('img')
    img.src = canvas.toDataURL('image/png')
    img.alt = "Group output image"
    img.style.maxWidth = "100%"
    img.style.display = "block"
    resultDiv.appendChild(img)

    // copy button
    const copyBtn = document.createElement('button')
    copyBtn.textContent = "Copy image"
    copyBtn.className = "wc-btn wc-primary"
    copyBtn.onclick = async function(){
      try{
        // canvas -> blob -> clipboard
        canvas.toBlob(async function(blob){
          if(!blob) throw new Error("Failed to create image blob")
          if(navigator.clipboard && navigator.clipboard.write){
            const item = new ClipboardItem({'image/png': blob})
            await navigator.clipboard.write([item])
            copyBtn.textContent = "Copied"
            setTimeout(()=> copyBtn.textContent = "Copy image", 1500)
          } else {
            // fallback: open image in new tab for manual copy
            const url = URL.createObjectURL(blob)
            window.open(url, "_blank")
          }
        })
      }catch(e){
        // fallback open data URL
        const url = img.src
        window.open(url, "_blank")
      }
    }
    resultDiv.appendChild(copyBtn)

    // (no text fallback)

    // Update weights after successful generation
    const updatedWeightsBySlot = {}

    group.forEach(g=>{
      if(g.pug) return

      const slotName = getSlotName(slots[g.slotIndex], g.slotIndex)
      if(!updatedWeightsBySlot[slotName]){
        updatedWeightsBySlot[slotName] = loadWeights(slotName)
      }

      const weights = updatedWeightsBySlot[slotName]
      const key = getSpecKey(g)

      // Reset selected spec
      weights[key] = 0.1
    })

    // Now increase all other specs by 20%
    slots.forEach((slot, i)=>{
      const slotName = getSlotName(slot, i)

      if(!updatedWeightsBySlot[slotName]){
        updatedWeightsBySlot[slotName] = loadWeights(slotName)
      }

      const weights = updatedWeightsBySlot[slotName]

      // get all possible specs for this slot
      let allSpecs = []
      slot.querySelectorAll(".specTick").forEach(spec=>{
        if(spec.checked){
          allSpecs.push({
            class: spec.dataset.class,
            spec: spec.dataset.spec
          })
        }
      })

      allSpecs.forEach(s=>{
        const key = s.class + "|" + s.spec

        // skip if this spec was selected
        const wasSelected = group.some(g =>
          !g.pug &&
          g.slotIndex === i &&
          g.class === s.class &&
          g.spec === s.spec
        )

        if(!wasSelected){
          weights[key] = (weights[key] || 0.1) * 1.5 + 0.3
        }
      })
    })

    // ROLE WEIGHT UPDATES
    const updatedRoleWeightsBySlot = {}

    group.forEach(g=>{
      // Skip role weight tracking for slots that can only ever fill one role —
      // penalising their only role causes all future attempts to fail.
      if(!g.pug && forcedRoles[g.slotIndex]) return

      const slotName = getSlotName(slots[g.slotIndex], g.slotIndex)

      if(!updatedRoleWeightsBySlot[slotName]){
        updatedRoleWeightsBySlot[slotName] = loadRoleWeights(slotName)
      }

      const weights = updatedRoleWeightsBySlot[slotName]

      // reset selected role
      weights[g.role] = 0.1
    })

    // increase other roles
    Object.entries(updatedRoleWeightsBySlot).forEach(([slotName, weights])=>{
      ["tank","healer","dps"].forEach(role=>{
        const wasSelected = group.some(g =>
          getSlotName(slots[g.slotIndex], g.slotIndex) === slotName &&
          g.role === role
        )

        if(!wasSelected){
          weights[role] = (weights[role] || 0.1) * 1.5 + 0.3
        }
      })
    })

    // save
    Object.entries(updatedRoleWeightsBySlot).forEach(([slotName, weights])=>{
      saveRoleWeights(slotName, weights)
    })

    // Save all weights
    Object.entries(updatedWeightsBySlot).forEach(([slotName, weights])=>{
      saveWeights(slotName, weights)
    })

    return
  }

  document.getElementById("result").innerHTML="No valid group found."
}
</script>
